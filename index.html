<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <meta name="description" content="Arena News - Portal de notícias esportivas para Smart TV" />
  <meta name="application-name" content="Arena News" />
  <title>Arena News</title>
  <style>
    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS — base 1920x1080
    ═══════════════════════════════════════════════════════ */
    :root {
      --blue:       #034EA2;
      --blue-l:     #1a6fd4;
      --blue-glow:  rgba(3,78,162,0.5);
      --green:      #00ffae;
      --green-glow: rgba(0,255,174,0.45);
      --green-dim:  #00c98a;
      --red:        #e53935;
      --gold:       #ffb300;

      --bg:         #0b0b0b;
      --bg-card:    #141418;
      --bg-header:  rgba(11,11,11,0.97);
      --border:     rgba(255,255,255,0.07);

      --txt:        #f2f2f2;
      --txt-dim:    #9a9aaa;
      --txt-faint:  #484858;

      /* TV-safe sizes */
      --fs-logo:   42px;
      --fs-nav:    26px;
      --fs-sec:    28px;
      --fs-hero:   40px;
      --fs-card:   32px;
      --fs-desc:   22px;
      --fs-meta:   18px;
      --fs-tag:    15px;
      --fs-tick:   20px;
      --fs-goals:  48px;
      --fs-team:   22px;
      --fs-foot:   18px;
      --fs-clock:  36px;

      --r:         14px;
      --tr:        0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1920px;
      min-height: 1080px;
      margin: 0 auto;
      background: var(--bg);
      color: var(--txt);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      height: 1080px;
      overflow-y: scroll;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    #app::-webkit-scrollbar { width: 6px; }
    #app::-webkit-scrollbar-track { background: transparent; }
    #app::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

    /* ── TICKER ──────────────────────────────────────────── */
    .ticker-wrap {
      width: 100%; height: 46px;
      background: var(--blue);
      overflow: hidden;
      display: flex; align-items: center;
    }
    .ticker-track {
      display: flex; white-space: nowrap;
      animation: ticker 52s linear infinite;
      will-change: transform;
    }
    .ticker-track:hover { animation-play-state: paused; }
    .ticker-item { font-size: var(--fs-tick); font-weight: 500; color: #fff; padding: 0 56px; }
    .ticker-sep  { color: rgba(255,255,255,0.35); }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 200;
      width: 100%; height: 100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 80px;
      background: var(--bg-header);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .logo { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .logo-badge {
      width: 56px; height: 56px;
      background: var(--blue); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; letter-spacing: -2px; color: #fff;
    }
    .logo-name { font-size: var(--fs-logo); font-weight: 800; letter-spacing: 1px; color: var(--txt); line-height: 1; }
    .logo-name em { color: var(--blue-l); font-style: normal; }

    /* Nav */
    nav { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      padding: 12px 28px; border-radius: 100px;
      border: 2px solid transparent; background: transparent;
      color: var(--txt-dim); font-size: var(--fs-nav); font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: all var(--tr); outline: none;
    }
    .nav-btn.active           { background: var(--blue); border-color: var(--blue); color: #fff; }
    .nav-btn.focused          { border-color: var(--green); color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); outline: none; }
    .nav-btn.active.focused   { background: var(--blue); color: #fff; border-color: var(--green); }

    /* Clock */
    .hdr-clock { flex-shrink: 0; text-align: right; }
    #clock      { font-size: var(--fs-clock); font-weight: 700; letter-spacing: 3px; color: var(--txt); line-height: 1; font-variant-numeric: tabular-nums; }
    #clock-date { font-size: var(--fs-meta); color: var(--txt-dim); letter-spacing: 1px; margin-top: 4px; }

    /* ── MAIN ────────────────────────────────────────────── */
    main { padding: 48px 80px 64px; }

    .sec-head { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
    .sec-title { font-size: var(--fs-sec); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--txt); white-space: nowrap; }
    .sec-line  { flex: 1; height: 2px; background: linear-gradient(90deg, var(--blue), transparent); border-radius: 1px; }
    .sec-badge { font-size: var(--fs-meta); color: var(--txt-dim); white-space: nowrap; }

    .live-badge { display: flex; align-items: center; gap: 8px; font-size: var(--fs-meta); font-weight: 700; color: var(--red); letter-spacing: 2px; text-transform: uppercase; }
    .live-dot   { width: 10px; height: 10px; background: var(--red); border-radius: 50%; animation: blink 1.1s infinite; }
    @keyframes blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(1.5); }
    }

    /* ── SCORES ──────────────────────────────────────────── */
    .scores-section { margin-bottom: 56px; }
    .scores-row { display: grid; grid-template-columns: repeat(6,1fr); gap: 16px; }

    .score-card {
      background: var(--bg-card); border: 2px solid transparent; border-radius: var(--r);
      padding: 20px 24px 18px; cursor: pointer; outline: none;
      transition: transform var(--tr), border-color var(--tr), box-shadow var(--tr);
    }
    .score-card.focused,
    .score-card:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px var(--green-glow);
      transform: translateY(-4px) scale(1.02); outline: none;
    }
    .score-league { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--txt-dim); margin-bottom: 14px; }
    .score-teams  { display: flex; flex-direction: column; gap: 8px; }
    .score-team   { display: flex; align-items: center; justify-content: space-between; }
    .team-name    { font-size: var(--fs-team); font-weight: 600; color: var(--txt); }
    .team-goals   { font-size: var(--fs-goals); font-weight: 900; color: var(--txt); min-width: 40px; text-align: center; line-height: 1; }
    .team-goals.w { color: var(--green-dim); }
    .score-status { margin-top: 12px; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .s-live { color: var(--red); }
    .s-ft   { color: var(--txt-faint); }
    .s-soon { color: var(--gold); }

    /* ── HERO GRID ───────────────────────────────────────── */
    .hero-section { margin-bottom: 56px; }
    .hero-grid { display: grid; grid-template-columns: 2.2fr 1fr; grid-template-rows: auto auto; gap: 20px; }
    .hero-grid .news-card:first-child { grid-row: span 2; }

    /* ── NEWS GRID ───────────────────────────────────────── */
    .news-section { margin-bottom: 56px; }
    .news-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }

    /* ── NEWS CARD ───────────────────────────────────────── */
    .news-card {
      position: relative; background: var(--bg-card); border-radius: var(--r);
      border: 2px solid transparent; overflow: hidden;
      cursor: pointer; outline: none;
      transition: transform var(--tr), border-color var(--tr), box-shadow var(--tr);
    }
    .news-card.focused,
    .news-card:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 5px var(--green-glow), 0 12px 48px rgba(0,0,0,0.6);
      transform: scale(1.04); z-index: 20; outline: none;
    }
    .news-card:hover:not(.focused) { border-color: rgba(3,78,162,0.45); transform: scale(1.02); }

    .card-img { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #1c1c24; }
    .hero-grid .news-card:first-child .card-img { aspect-ratio: 16/10; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
    .card-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.55)); pointer-events: none; }
    .news-card.focused .card-img img,
    .news-card:hover   .card-img img { transform: scale(1.07); }

    .cat-tag {
      position: absolute; top: 14px; left: 14px; z-index: 2;
      padding: 5px 14px; border-radius: 100px;
      font-size: var(--fs-tag); font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .t-futebol  { background: rgba(3,78,162,0.85);   color: #fff; }
    .t-basquete { background: rgba(230,81,0,0.85);   color: #fff; }
    .t-tenis    { background: rgba(67,160,71,0.85);  color: #fff; }
    .t-formula  { background: rgba(183,28,28,0.85);  color: #fff; }
    .t-mma      { background: rgba(106,27,154,0.85); color: #fff; }
    .t-mais     { background: rgba(0,0,0,0.7);       color: #fff; }

    .live-tag {
      position: absolute; top: 14px; right: 14px; z-index: 2;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: var(--red); border-radius: 6px;
      font-size: 14px; font-weight: 800; letter-spacing: 2px; color: #fff;
    }
    .live-tag .dot { width: 7px; height: 7px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }

    .card-body { padding: 18px 22px 22px; }
    .hero-grid .news-card:first-child .card-body { padding: 24px 28px 28px; }
    .card-meta  { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-src   { font-size: var(--fs-meta); font-weight: 700; color: #4a9fff; }
    .card-dot   { color: var(--txt-faint); font-size: 12px; }
    .card-time  { font-size: var(--fs-meta); color: var(--txt-dim); }
    .card-title {
      font-size: var(--fs-card); font-weight: 800; line-height: 1.25; color: var(--txt);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .hero-grid .news-card:first-child .card-title { font-size: var(--fs-hero); -webkit-line-clamp: 4; }
    .card-desc {
      margin-top: 10px; font-size: var(--fs-desc); color: var(--txt-dim); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 80px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .foot-copy { font-size: var(--fs-foot); color: var(--txt-dim); }
    .foot-links { display: flex; gap: 36px; align-items: center; }
    .foot-links a {
      font-size: var(--fs-foot); font-weight: 600; color: var(--txt-dim);
      text-decoration: none; padding: 8px 0; border-bottom: 2px solid transparent;
      transition: all var(--tr); outline: none;
    }
    .foot-links a[href="privacidade.html"] { color: #4a9fff; }
    .foot-links a.focused,
    .foot-links a:focus { color: var(--green); border-bottom-color: var(--green); outline: none; }
    .foot-links a:hover:not(.focused) { color: #4a9fff; }
    .foot-ver { font-size: 15px; color: var(--txt-faint); letter-spacing: 1px; font-family: monospace; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 1280px) {
      body { width: 1280px; }
      #app { height: 720px; }
      :root { --fs-logo:32px; --fs-nav:20px; --fs-hero:30px; --fs-card:24px; --fs-desc:17px; --fs-meta:14px; --fs-goals:36px; --fs-clock:26px; }
      header { height: 76px; padding: 0 56px; }
      main { padding: 32px 56px 48px; }
      footer { padding: 20px 56px; }
      .scores-row { grid-template-columns: repeat(3,1fr); }
      .news-grid  { grid-template-columns: repeat(3,1fr); }
    }
    @media (min-width: 3000px) {
      body { width: 3840px; }
      #app { height: 2160px; }
      :root { --fs-logo:72px; --fs-nav:44px; --fs-hero:72px; --fs-card:56px; --fs-desc:38px; --fs-meta:30px; --fs-goals:80px; --fs-clock:60px; }
      header { height: 160px; padding: 0 140px; }
      main { padding: 80px 140px 100px; }
      footer { padding: 44px 140px; }
    }
  </style>
</head>

function updateClock() {
  var d = new Date();
  document.getElementById('clock').textContent      = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  document.getElementById('clock-date').textContent = DAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

/* ═══════════════════════════════════════════════════════
   TICKER
═══════════════════════════════════════════════════════ */
function renderTicker(items) {
  var src = items.concat(items);
  var html = '';
  for (var i = 0; i < src.length; i++) {
    html += '<span class="ticker-item">' + src[i] + '</span><span class="ticker-sep"> &bull; </span>';
  }
  document.getElementById('ticker-track').innerHTML = html;
}
renderTicker(TICKER_BASE);

/* ═══════════════════════════════════════════════════════
   SCORES
═══════════════════════════════════════════════════════ */
function renderScores() {
  var html = '';
  for (var i = 0; i < SCORES.length; i++) {
    var s  = SCORES[i];
    var hw = s.sh > s.sa ? ' w' : '';
    var aw = s.sa > s.sh ? ' w' : '';
    var sc = s.st === 'live' ? 's-live' : s.st === 'ft' ? 's-ft' : 's-soon';
    var sl = s.st === 'live' ? '&#128308; ' + s.min : s.st === 'ft' ? 'Encerrado' : '&#128336; ' + s.min;
    html += '<div class="score-card focusable" tabindex="0" role="listitem" aria-label="' + s.home + ' versus ' + s.away + '">'
          +   '<div class="score-league">' + s.league + '</div>'
          +   '<div class="score-teams">'
          +     '<div class="score-team"><span class="team-name">' + s.home + '</span><span class="team-goals' + hw + '">' + s.sh + '</span></div>'
          +     '<div class="score-team"><span class="team-name">' + s.away + '</span><span class="team-goals' + aw + '">' + s.sa + '</span></div>'
          +   '</div>'
          +   '<div class="score-status ' + sc + '">' + sl + '</div>'
          + '</div>';
  }
  document.getElementById('scores-row').innerHTML = html;
}
renderScores();

/* ═══════════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════════ */
function imgSrc(cat, idx) {
  var arr = IMGS[cat] || IMGS.futebol;
  return arr[idx % arr.length];
}

function makeCard(n, withDesc) {
  var lv   = n.live ? '<div class="live-tag"><div class="dot"></div>AO VIVO</div>' : '';
  var desc = withDesc ? '<p class="card-desc">' + n.desc + '</p>' : '';
  return '<article class="news-card focusable" tabindex="0" role="button" aria-label="' + n.title + '">'
       +   '<div class="card-img">'
       +     '<img src="' + imgSrc(n.cat, n.img) + '" alt="' + n.title + '" loading="lazy" />'
       +     '<div class="cat-tag t-' + n.cat + '">' + n.cat + '</div>'
       +     lv
       +   '</div>'
       +   '<div class="card-body">'
       +     '<div class="card-meta"><span class="card-src">' + n.src + '</span><span class="card-dot">&middot;</span><span class="card-time">' + n.time + '</span></div>'
       +     '<h3 class="card-title">' + n.title + '</h3>'
       +     desc
       +   '</div>'
       + '</article>';
}

function renderHero() {
  var h = '';
  for (var i = 0; i < HERO.length; i++) h += makeCard(HERO[i], true);
  document.getElementById('hero-grid').innerHTML = h;
}

function renderNews(list) {
  var h = '';
  for (var i = 0; i < list.length; i++) h += makeCard(list[i], false);
  document.getElementById('news-grid').innerHTML = h;
  document.getElementById('news-count').textContent = list.length + ' notícias';
}

renderHero();
renderNews(NEWS);

/* ═══════════════════════════════════════════════════════
   CATEGORY FILTER
═══════════════════════════════════════════════════════ */
var navBtns = document.querySelectorAll('.nav-btn');
for (var ni = 0; ni < navBtns.length; ni++) {
  navBtns[ni].addEventListener('click', (function(btn) {
    return function() {
      for (var j = 0; j < navBtns.length; j++) navBtns[j].classList.remove('active');
      btn.classList.add('active');
      var cat = btn.getAttribute('data-cat');
      var filtered = [];
      if (cat === 'todos') {
        filtered = NEWS;
      } else {
        for (var k = 0; k < NEWS.length; k++) {
          if (NEWS[k].cat === cat) filtered.push(NEWS[k]);
        }
      }
      renderNews(filtered);
      rebuildFocusable();
    };
  })(navBtns[ni]));
}

/* ═══════════════════════════════════════════════════════
   SPATIAL NAVIGATION
═══════════════════════════════════════════════════════ */
var focusEls = [];
var focusIdx = 0;

function rebuildFocusable() {
  focusEls = Array.prototype.slice.call(document.querySelectorAll('.focusable'));
  if (focusIdx >= focusEls.length) focusIdx = 0;
}

function elCenter(el) {
  var r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function applyFocus(idx) {
  if (idx < 0 || idx >= focusEls.length) return;
  for (var i = 0; i < focusEls.length; i++) focusEls[i].classList.remove('focused');
  focusIdx = idx;
  var el = focusEls[focusIdx];
  el.classList.add('focused');
  el.focus({ preventScroll: false });
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

function findNearest(dir) {
  var cur = focusEls[focusIdx];
  if (!cur) return -1;
  var cc = elCenter(cur);
  var best = -1, bestScore = Infinity;
  for (var i = 0; i < focusEls.length; i++) {
    if (i === focusIdx) continue;
    var ec = elCenter(focusEls[i]);
    var dx = ec.x - cc.x;
    var dy = ec.y - cc.y;
    var primary, secondary;
    if (dir === 'right') { if (dx <= 2)  continue; primary = dx;  secondary = Math.abs(dy); }
    else if (dir === 'left')  { if (dx >= -2) continue; primary = -dx; secondary = Math.abs(dy); }
    else if (dir === 'down')  { if (dy <= 2)  continue; primary = dy;  secondary = Math.abs(dx); }
    else if (dir === 'up')    { if (dy >= -2) continue; primary = -dy; secondary = Math.abs(dx); }
    else continue;
    var score = primary + secondary * 0.35;
    if (score < bestScore) { bestScore = score; best = i; }
  }
  return best;
}

/* Tizen key codes */
var K_UP    = [38];
var K_DOWN  = [40];
var K_LEFT  = [37];
var K_RIGHT = [39];
var K_ENTER = [13];
var K_BACK  = [8, 10009];

function inKeys(code, arr) {
  for (var i = 0; i < arr.length; i++) if (arr[i] === code) return true;
  return false;
}

document.addEventListener('keydown', function(e) {
  if (!focusEls.length) return;
  var kc = e.keyCode;
  var t  = -1;
  if      (inKeys(kc, K_UP))    { e.preventDefault(); t = findNearest('up');    if (t >= 0) applyFocus(t); }
  else if (inKeys(kc, K_DOWN))  { e.preventDefault(); t = findNearest('down');  if (t >= 0) applyFocus(t); }
  else if (inKeys(kc, K_LEFT))  { e.preventDefault(); t = findNearest('left');  if (t >= 0) applyFocus(t); }
  else if (inKeys(kc, K_RIGHT)) { e.preventDefault(); t = findNearest('right'); if (t >= 0) applyFocus(t); }
  else if (inKeys(kc, K_ENTER)) { e.preventDefault(); if (focusEls[focusIdx]) focusEls[focusIdx].click(); }
  else if (inKeys(kc, K_BACK))  { e.preventDefault(); applyFocus(0); document.getElementById('app').scrollTop = 0; }
});

document.addEventListener('mouseover', function(e) {
  var el = e.target && e.target.closest ? e.target.closest('.focusable') : null;
  if (!el) return;
  var idx = focusEls.indexOf(el);
  if (idx >= 0) applyFocus(idx);
});

/* Tizen back key registration */
if (typeof tizen !== 'undefined') {
  try { tizen.tvinputdevice.registerKey('Back'); } catch (ex) { /* silently ignore */ }
}

/* Bootstrap */
rebuildFocusable();
applyFocus(0);

/* ═══════════════════════════════════════════════════════
   LIVE TICKER ROTATION (every 18s)
═══════════════════════════════════════════════════════ */
var LIVE_LINES = [
  '⚽ GOOOL! Pedro marca para o Flamengo — 2x1',
  '🔄 Substituição no FLA: entra Gabigol, sai Bruno Henrique',
  '🟨 Cartão amarelo para defensor do Palmeiras',
  '📊 Posse de bola: Flamengo 54% x Palmeiras 46%'
];
var liveIdx = 0;

setInterval(function() {
  var items = [LIVE_LINES[liveIdx]].concat(TICKER_BASE);
  liveIdx = (liveIdx + 1) % LIVE_LINES.length;
  renderTicker(items);
}, 18000);

</script>
