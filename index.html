<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<meta name="application-name" content="Arena Sports"/>
<meta name="description" content="Arena Sports — Live scores and match center for Smart TV"/>
<title>Arena Sports</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:        #080b12;
  --bg2:       #0f1420;
  --bg3:       #161d2e;
  --bg4:       #1d2540;
  --blue:      #2563eb;
  --blue-l:    #3b82f6;
  --blue-glow: rgba(59,130,246,0.7);
  --blue-dim:  rgba(37,99,235,0.18);
  --green:     #16a34a;
  --green-l:   #22c55e;
  --red:       #dc2626;
  --red-l:     #ef4444;
  --gold:      #d97706;
  --gold-l:    #f59e0b;
  --txt:       #f1f5f9;
  --txt2:      #94a3b8;
  --txt3:      #475569;
  --border:    rgba(255,255,255,0.08);
  --r:         14px;
  --r-sm:      8px;
  --tr:        0.16s ease;
  /* TV sizes */
  --flogo:  36px;
  --fnav:   22px;
  --fsec:   26px;
  --fcard:  20px;
  --fbody:  18px;
  --fmeta:  15px;
  --fsmall: 13px;
  --fhero:  44px;
  --fscore: 64px;
}
html{font-size:16px}
body{
  width:1920px;min-height:1080px;margin:0 auto;
  background:var(--bg);color:var(--txt);
  font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
#app{width:1920px;height:1080px;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* ═══════════════════════════════════════════════════════════════
   FOCUS SYSTEM
═══════════════════════════════════════════════════════════════ */
.focusable{outline:none;transition:transform var(--tr),border-color var(--tr),box-shadow var(--tr),background var(--tr);}
.focusable.focused{
  border-color:var(--blue-l) !important;
  box-shadow:0 0 0 3px var(--blue-glow),0 0 28px rgba(59,130,246,0.3) !important;
  z-index:20;position:relative;
}
.card-focus.focused{transform:scale(1.04);}
.nav-focus.focused{background:var(--blue) !important;color:#fff !important;transform:none;}
.pill-focus.focused{transform:none;}

/* ═══════════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════════ */
header{
  flex-shrink:0;height:84px;width:100%;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 56px;gap:48px;
}
.logo{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.logo-mark{
  width:48px;height:48px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;letter-spacing:-1px;
}
.logo-text{font-size:var(--flogo);font-weight:900;color:var(--txt);letter-spacing:.5px;}
.logo-text em{color:var(--blue-l);font-style:normal;}

nav{display:flex;align-items:center;gap:6px;flex:1;}
.nav-btn{
  padding:10px 24px;border-radius:100px;
  border:2px solid transparent;background:transparent;
  color:var(--txt2);font-size:var(--fnav);font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all var(--tr);outline:none;
}
.nav-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.nav-btn:hover:not(.active){background:var(--bg3);color:var(--txt);}

.hdr-right{margin-left:auto;display:flex;align-items:center;gap:20px;flex-shrink:0;}
#clock-wrap{text-align:right;}
#clock{font-size:30px;font-weight:700;letter-spacing:2px;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums;}
#cdate{font-size:var(--fsmall);color:var(--txt2);margin-top:3px;}

/* ═══════════════════════════════════════════════════════════════
   SCROLLABLE MAIN
═══════════════════════════════════════════════════════════════ */
#main{
  flex:1;overflow-y:scroll;overflow-x:hidden;
  padding:36px 56px 56px;background:var(--bg);
}
#main::-webkit-scrollbar{width:4px;}
#main::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}

/* ═══════════════════════════════════════════════════════════════
   SECTION HEADERS
═══════════════════════════════════════════════════════════════ */
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.sec-title{font-size:var(--fsec);font-weight:800;color:var(--txt);}
.sec-line{flex:1;height:2px;background:linear-gradient(90deg,var(--blue),transparent);border-radius:1px;}
.sec-badge{font-size:var(--fmeta);color:var(--txt2);}
.live-indicator{display:flex;align-items:center;gap:7px;font-size:var(--fmeta);font-weight:700;color:var(--red-l);letter-spacing:1.5px;text-transform:uppercase;}
.li-dot{width:9px;height:9px;background:var(--red-l);border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}

/* ═══════════════════════════════════════════════════════════════
   MATCH CARDS GRID
═══════════════════════════════════════════════════════════════ */
.matches-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:20px;margin-bottom:48px;
}
.match-card{
  background:var(--bg2);border-radius:var(--r);
  border:2px solid var(--border);
  cursor:pointer;outline:none;overflow:hidden;
  transition:transform var(--tr),border-color var(--tr),box-shadow var(--tr);
  position:relative;
}
.match-card.focused{
  transform:scale(1.04);
  border-color:var(--blue-l);
  box-shadow:0 0 0 3px var(--blue-glow),0 12px 40px rgba(0,0,0,0.5);
}
.match-card:hover:not(.focused){border-color:rgba(59,130,246,.35);transform:scale(1.015);}

/* Card top stripe */
.mc-stripe{
  height:4px;width:100%;
}
.stripe-live{background:linear-gradient(90deg,var(--red),var(--red-l));}
.stripe-ft{background:linear-gradient(90deg,var(--txt3),var(--txt3));}
.stripe-soon{background:linear-gradient(90deg,var(--gold),var(--gold-l));}

/* Card header row */
.mc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;
}
.mc-league{font-size:var(--fsmall);font-weight:700;color:var(--txt2);letter-spacing:.5px;}
.mc-status{
  font-size:var(--fsmall);font-weight:800;letter-spacing:1.5px;
  padding:3px 10px;border-radius:100px;
  text-transform:uppercase;
}
.status-live{background:rgba(220,38,38,.18);color:var(--red-l);display:flex;align-items:center;gap:5px;}
.status-live .dot{width:6px;height:6px;background:var(--red-l);border-radius:50%;animation:blink .9s infinite;}
.status-ft{background:rgba(71,85,105,.25);color:var(--txt2);}
.status-soon{background:rgba(217,119,6,.18);color:var(--gold-l);}

/* Teams + score */
.mc-body{padding:8px 16px 16px;}
.mc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mc-team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
.mc-crest{
  width:56px;height:56px;border-radius:50%;
  background:var(--bg3);display:flex;align-items:center;
  justify-content:center;font-size:30px;
  border:2px solid var(--border);flex-shrink:0;
}
.mc-tname{
  font-size:var(--fbody);font-weight:700;color:var(--txt);
  text-align:center;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.mc-score-col{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;flex-shrink:0;padding:0 8px;
}
.mc-score{
  font-size:42px;font-weight:900;color:var(--txt);
  letter-spacing:4px;line-height:1;
  font-variant-numeric:tabular-nums;
}
.mc-score.score-live{color:var(--red-l);}
.mc-score.score-soon{font-size:22px;color:var(--gold-l);letter-spacing:1px;}
.mc-min{font-size:var(--fsmall);color:var(--txt2);font-weight:600;}

/* Card footer */
.mc-foot{
  border-top:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;gap:8px;
}
.mc-venue{font-size:var(--fsmall);color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-arrow{margin-left:auto;color:var(--blue-l);font-size:var(--fmeta);font-weight:700;flex-shrink:0;}

/* ═══════════════════════════════════════════════════════════════
   NEWS CARDS
═══════════════════════════════════════════════════════════════ */
.news-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:48px;}
.news-card{
  background:var(--bg2);border-radius:var(--r);
  border:2px solid var(--border);overflow:hidden;
}
.nc-img{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg3);overflow:hidden;}
.nc-img img{width:100%;height:100%;object-fit:cover;display:block;}
.nc-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.55));pointer-events:none;}
.nc-cat{
  position:absolute;top:10px;left:10px;z-index:2;
  padding:4px 12px;border-radius:100px;
  font-size:var(--fsmall);font-weight:800;letter-spacing:1px;text-transform:uppercase;
  backdrop-filter:blur(10px);
}
.ncat-football {background:rgba(37,99,235,.85);color:#fff;}
.ncat-basketball{background:rgba(234,88,12,.85);color:#fff;}
.ncat-local    {background:rgba(22,163,74,.85);color:#fff;}
.nc-body{padding:14px 16px 18px;}
.nc-src{font-size:var(--fmeta);font-weight:700;color:var(--blue-l);margin-bottom:6px;}
.nc-title{font-size:var(--fcard);font-weight:800;line-height:1.3;color:var(--txt);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ═══════════════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════════════ */
footer{
  flex-shrink:0;background:var(--bg2);
  border-top:1px solid var(--border);
  padding:14px 56px;
  display:flex;align-items:center;justify-content:space-between;
}
.foot-copy{font-size:var(--fsmall);color:var(--txt3);}
.foot-links{display:flex;gap:24px;}
.foot-links a{
  font-size:var(--fsmall);font-weight:600;color:var(--txt2);
  text-decoration:none;border-bottom:2px solid transparent;
  transition:all var(--tr);outline:none;padding:2px 0;
}
.foot-links a[href="privacy.html"]{color:var(--blue-l);}
.foot-links a.focused,.foot-links a:focus{color:var(--blue-l);border-bottom-color:var(--blue-l);outline:none;}
.foot-ver{font-size:12px;color:var(--txt3);font-family:monospace;letter-spacing:1px;}

/* ═══════════════════════════════════════════════════════════════
   DETAIL DRAWER
═══════════════════════════════════════════════════════════════ */
#drawer-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .3s ease;
}
#drawer-overlay.open{background:rgba(0,0,0,.55);pointer-events:auto;}

#drawer{
  position:fixed;top:0;right:0;bottom:0;
  width:540px;z-index:501;
  background:#0b0f1a;
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
  padding:0;
}
#drawer::-webkit-scrollbar{width:3px;}
#drawer::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}
#drawer.open{transform:translateX(0);}

/* Drawer header */
.dr-header{
  padding:28px 32px 20px;
  border-bottom:1px solid var(--border);
  background:#0f1520;
  position:sticky;top:0;z-index:10;
}
.dr-back{
  display:flex;align-items:center;gap:8px;
  font-size:var(--fmeta);color:var(--txt2);margin-bottom:16px;
  cursor:pointer;
}
.dr-competition{
  font-size:var(--fsmall);font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--blue-l);margin-bottom:4px;
}
.dr-phase{font-size:var(--fmeta);color:var(--txt2);margin-bottom:2px;}
.dr-venue{font-size:var(--fmeta);color:var(--txt3);}

/* Drawer score block */
.dr-score-block{
  padding:28px 32px;
  display:flex;flex-direction:column;align-items:center;
  gap:16px;
  background:linear-gradient(180deg,#0f1520,var(--bg));
  border-bottom:1px solid var(--border);
}
.dr-teams-row{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;gap:12px;
}
.dr-club{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;}
.dr-crest{
  width:72px;height:72px;border-radius:50%;
  background:var(--bg3);display:flex;align-items:center;
  justify-content:center;font-size:40px;
  border:2px solid var(--border);
}
.dr-cname{
  font-size:var(--fcard);font-weight:800;color:var(--txt);
  text-align:center;
}
.dr-score-center{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;}
.dr-score{
  font-size:var(--fscore);font-weight:900;
  letter-spacing:6px;color:var(--txt);
  font-variant-numeric:tabular-nums;line-height:1;
}
.dr-score.live{color:var(--red-l);}
.dr-score.soon{font-size:28px;color:var(--gold-l);letter-spacing:2px;}
.dr-status-badge{
  font-size:var(--fsmall);font-weight:800;letter-spacing:2px;
  text-transform:uppercase;padding:4px 14px;border-radius:100px;
}
.dsb-live{background:rgba(220,38,38,.2);color:var(--red-l);}
.dsb-ft{background:rgba(71,85,105,.3);color:var(--txt2);}
.dsb-soon{background:rgba(217,119,6,.2);color:var(--gold-l);}
.dr-min{font-size:var(--fmeta);color:var(--red-l);font-weight:700;}

/* Drawer info rows */
.dr-info-block{padding:20px 32px;border-bottom:1px solid var(--border);}
.dr-info-title{font-size:var(--fmeta);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px;}
.dr-info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.dr-info-row:last-child{border-bottom:none;}
.dr-il{font-size:var(--fmeta);color:var(--txt2);}
.dr-iv{font-size:var(--fmeta);font-weight:600;color:var(--txt);text-align:right;}

/* Lineups */
.dr-lineup-block{padding:20px 32px;}
.dr-lu-title{font-size:var(--fmeta);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:16px;}
.dr-lu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.dr-lu-team{}
.dr-lu-tname{font-size:var(--fbody);font-weight:800;color:var(--blue-l);margin-bottom:10px;}
.dr-player{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.dr-pnum{font-size:var(--fmeta);font-weight:700;color:var(--txt3);width:24px;text-align:center;flex-shrink:0;}
.dr-pname{font-size:var(--fbody);color:var(--txt);}
.dr-ppos{font-size:var(--fsmall);color:var(--txt3);margin-left:auto;}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE 720p
═══════════════════════════════════════════════════════════════ */
@media(max-width:1280px){
  body{width:1280px;}#app{height:720px;}
  :root{--flogo:26px;--fnav:17px;--fsec:20px;--fcard:16px;--fbody:14px;--fmeta:12px;--fsmall:11px;--fscore:44px;}
  header{height:64px;padding:0 36px;}
  #main{padding:24px 36px 40px;}
  footer{padding:10px 36px;}
  .matches-grid,.news-grid{grid-template-columns:repeat(3,1fr);}
  #drawer{width:420px;}
}
</style>
</head>

var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function pad(n){return n<10?'0'+n:''+n;}
function tick(){
  var d=new Date();
  document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  document.getElementById('cdate').textContent=DAYS[d.getDay()]+', '+d.getDate()+' '+MTHS[d.getMonth()]+' '+d.getFullYear();
}
tick(); setInterval(tick,1000);

/* ═══════════════════════════════════════════════════════════════
   RENDER MATCHES
═══════════════════════════════════════════════════════════════ */
function statusHtml(m){
  if(m.status==='live'){
    return '<div class="mc-status status-live"><div class="dot"></div>LIVE '+m.min+'</div>';
  } else if(m.status==='ft'){
    return '<div class="mc-status status-ft">Full Time</div>';
  }
  return '<div class="mc-status status-soon">'+m.min+'</div>';
}
function stripeClass(s){
  return s==='live'?'stripe-live':s==='ft'?'stripe-ft':'stripe-soon';
}
function scoreHtml(m){
  if(m.status==='soon'){
    return '<div class="mc-score score-soon">'+m.home.short+' v '+m.away.short+'</div>'
          +'<div class="mc-min">'+m.min+'</div>';
  }
  var cls = m.status==='live'?'score-live':'';
  return '<div class="mc-score '+cls+'">'+m.score.h+'<span style="color:var(--txt3);margin:0 4px;font-size:32px;">:</span>'+m.score.a+'</div>'
        +(m.status==='live'?'<div class="mc-min">'+m.min+'</div>':'');
}

function renderMatches(list){
  var h='';
  for(var i=0;i<list.length;i++){
    var m=list[i];
    h+='<div class="match-card focusable card-focus" tabindex="0" role="button" data-id="'+m.id+'" aria-label="'+m.home.name+' vs '+m.away.name+'">'
     +'<div class="mc-stripe '+stripeClass(m.status)+'"></div>'
     +'<div class="mc-head"><span class="mc-league">'+m.league+'</span>'+statusHtml(m)+'</div>'
     +'<div class="mc-body">'
     +'<div class="mc-teams">'
     +'<div class="mc-team"><div class="mc-crest">'+m.home.crest+'</div><div class="mc-tname">'+m.home.name+'</div></div>'
     +'<div class="mc-score-col">'+scoreHtml(m)+'</div>'
     +'<div class="mc-team"><div class="mc-crest">'+m.away.crest+'</div><div class="mc-tname">'+m.away.name+'</div></div>'
     +'</div>'
     +'</div>'
     +'<div class="mc-foot"><span class="mc-venue">🏟 '+m.venue+'</span><span class="mc-arrow">Details ›</span></div>'
     +'</div>';
  }
  document.getElementById('matches-grid').innerHTML=h;
  document.getElementById('match-count').textContent=list.length+' matches';
}

function renderNews(){
  var h='';
  for(var i=0;i<NEWS_DATA.length;i++){
    var n=NEWS_DATA[i];
    h+='<div class="news-card">'
     +'<div class="nc-img"><img src="'+n.img+'" alt="'+n.title+'" loading="lazy"/>'
     +'<div class="nc-cat '+n.cls+'">'+n.cat+'</div></div>'
     +'<div class="nc-body"><div class="nc-src">'+n.src+'</div>'
     +'<h3 class="nc-title">'+n.title+'</h3></div>'
     +'</div>';
  }
  document.getElementById('news-grid').innerHTML=h;
}

/* ═══════════════════════════════════════════════════════════════
   DRAWER
═══════════════════════════════════════════════════════════════ */
var drawerOpen=false;
var drawerSourceIdx=-1;

function openDrawer(matchId){
  var m=null;
  for(var i=0;i<MATCHES.length;i++) if(MATCHES[i].id===matchId){m=MATCHES[i];break;}
  if(!m) return;

  /* score display */
  var scoreTxt, scoreCls, statusCls, statusTxt, minTxt='';
  if(m.status==='live'){
    scoreTxt=m.score.h+' : '+m.score.a; scoreCls='live';
    statusCls='dsb-live'; statusTxt='● LIVE';
    minTxt='<div class="dr-min">'+m.min+'</div>';
  } else if(m.status==='ft'){
    scoreTxt=m.score.h+' : '+m.score.a; scoreCls='';
    statusCls='dsb-ft'; statusTxt='Full Time';
  } else {
    scoreTxt=m.min; scoreCls='soon';
    statusCls='dsb-soon'; statusTxt='Scheduled';
  }

  /* lineups */
  var luHtml='';
  if(m.lineup){
    var hpl='', apl='';
    for(var p=0;p<m.lineup.home.length;p++){
      var pl=m.lineup.home[p];
      hpl+='<div class="dr-player"><span class="dr-pnum">'+pl.n+'</span><span class="dr-pname">'+pl.name+'</span><span class="dr-ppos">'+pl.pos+'</span></div>';
    }
    for(var q=0;q<m.lineup.away.length;q++){
      var ql=m.lineup.away[q];
      apl+='<div class="dr-player"><span class="dr-pnum">'+ql.n+'</span><span class="dr-pname">'+ql.name+'</span><span class="dr-ppos">'+ql.pos+'</span></div>';
    }
    luHtml='<div class="dr-lineup-block">'
          +'<div class="dr-lu-title">Starting Lineups</div>'
          +'<div class="dr-lu-grid">'
          +'<div class="dr-lu-team"><div class="dr-lu-tname">'+m.home.name+'</div>'+hpl+'</div>'
          +'<div class="dr-lu-team"><div class="dr-lu-tname">'+m.away.name+'</div>'+apl+'</div>'
          +'</div></div>';
  }

  document.getElementById('drawer').innerHTML=
    '<div class="dr-header">'
   +'<div class="dr-back">← Press BACK to close</div>'
   +'<div class="dr-competition">'+m.league+'</div>'
   +'<div class="dr-phase">'+m.phase+'</div>'
   +'<div class="dr-venue">🏟 '+m.venue+'</div>'
   +'</div>'
   +'<div class="dr-score-block">'
   +'<div class="dr-teams-row">'
   +'<div class="dr-club"><div class="dr-crest">'+m.home.crest+'</div><div class="dr-cname">'+m.home.name+'</div></div>'
   +'<div class="dr-score-center">'
   +'<div class="dr-score '+scoreCls+'">'+scoreTxt+'</div>'
   +'<div class="dr-status-badge '+statusCls+'">'+statusTxt+'</div>'
   +minTxt
   +'</div>'
   +'<div class="dr-club"><div class="dr-crest">'+m.away.crest+'</div><div class="dr-cname">'+m.away.name+'</div></div>'
   +'</div>'
   +'</div>'
   +'<div class="dr-info-block">'
   +'<div class="dr-info-title">Match Info</div>'
   +'<div class="dr-info-row"><span class="dr-il">Competition</span><span class="dr-iv">'+m.league+'</span></div>'
   +'<div class="dr-info-row"><span class="dr-il">Stage</span><span class="dr-iv">'+m.phase+'</span></div>'
   +'<div class="dr-info-row"><span class="dr-il">Stadium</span><span class="dr-iv">'+m.venue+'</span></div>'
   +'<div class="dr-info-row"><span class="dr-il">Date &amp; Time</span><span class="dr-iv">'+m.date+'</span></div>'
   +'</div>'
   +luHtml;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  drawerOpen=true;
  document.getElementById('drawer').scrollTop=0;

  /* trap focus inside drawer — no focusable elements currently, just scroll */
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  drawerOpen=false;
  /* return focus to the card that opened it */
  if(drawerSourceIdx>=0) setFocus(drawerSourceIdx);
}

/* click on overlay closes drawer */
document.getElementById('drawer-overlay').addEventListener('click',function(){
  if(drawerOpen) closeDrawer();
});

/* ═══════════════════════════════════════════════════════════════
   SPATIAL NAVIGATION
═══════════════════════════════════════════════════════════════ */
var fEls=[], fIdx=0;

function rebuildFocusable(){
  fEls=Array.prototype.slice.call(document.querySelectorAll('.focusable'));
  if(fIdx>=fEls.length) fIdx=0;
}

function elCenter(el){
  var r=el.getBoundingClientRect();
  return {x:r.left+r.width/2, y:r.top+r.height/2};
}

function setFocus(idx){
  if(idx<0||idx>=fEls.length) return;
  for(var i=0;i<fEls.length;i++) fEls[i].classList.remove('focused');
  fIdx=idx;
  var el=fEls[fIdx];
  el.classList.add('focused');
  el.focus({preventScroll:false});
  /* scroll main panel */
  var main=document.getElementById('main');
  var r=el.getBoundingClientRect();
  var pr=main.getBoundingClientRect();
  if(r.bottom>pr.bottom-24) main.scrollTop+=r.bottom-pr.bottom+48;
  if(r.top<pr.top+24)       main.scrollTop-=pr.top-r.top+48;
}

function nearest(dir){
  var cur=fEls[fIdx]; if(!cur) return -1;
  var cc=elCenter(cur);
  var best=-1, bs=Infinity;
  for(var i=0;i<fEls.length;i++){
    if(i===fIdx) continue;
    var ec=elCenter(fEls[i]);
    var dx=ec.x-cc.x, dy=ec.y-cc.y;
    var primary, secondary;
    if(dir==='right'){ if(dx<=2)  continue; primary=dx;  secondary=Math.abs(dy); }
    else if(dir==='left') { if(dx>=-2) continue; primary=-dx; secondary=Math.abs(dy); }
    else if(dir==='down') { if(dy<=2)  continue; primary=dy;  secondary=Math.abs(dx); }
    else if(dir==='up')   { if(dy>=-2) continue; primary=-dy; secondary=Math.abs(dx); }
    else continue;
    var score=primary+secondary*0.3;
    if(score<bs){bs=score;best=i;}
  }
  return best;
}

var KU=[38], KD=[40], KL=[37], KR=[39], KE=[13], KB=[8,10009];
function inK(c,a){for(var i=0;i<a.length;i++)if(a[i]===c)return true;return false;}

document.addEventListener('keydown',function(e){
  var kc=e.keyCode;

  /* drawer is open — only BACK closes it, arrows scroll */
  if(drawerOpen){
    if(inK(kc,KB)){
      e.preventDefault();
      closeDrawer();
    } else if(inK(kc,KD)){
      e.preventDefault();
      document.getElementById('drawer').scrollTop+=160;
    } else if(inK(kc,KU)){
      e.preventDefault();
      document.getElementById('drawer').scrollTop-=160;
    }
    return;
  }

  if(!fEls.length) return;
  var t=-1;
  if(inK(kc,KU)){e.preventDefault();t=nearest('up');   if(t>=0)setFocus(t);}
  else if(inK(kc,KD)){e.preventDefault();t=nearest('down'); if(t>=0)setFocus(t);}
  else if(inK(kc,KL)){e.preventDefault();t=nearest('left'); if(t>=0)setFocus(t);}
  else if(inK(kc,KR)){e.preventDefault();t=nearest('right');if(t>=0)setFocus(t);}
  else if(inK(kc,KE)){
    e.preventDefault();
    var el=fEls[fIdx];
    if(el){
      var card=el.classList.contains('match-card')?el:null;
      if(card){
        drawerSourceIdx=fIdx;
        openDrawer(card.getAttribute('data-id'));
      } else {
        el.click();
      }
    }
  } else if(inK(kc,KB)){
    e.preventDefault();
    setFocus(0);
    document.getElementById('main').scrollTop=0;
  }
});

document.addEventListener('mouseover',function(e){
  if(drawerOpen) return;
  var el=e.target&&e.target.closest?e.target.closest('.focusable'):null;
  if(!el) return;
  var idx=fEls.indexOf(el);
  if(idx>=0) setFocus(idx);
});

/* Tizen back key */
if(typeof tizen!=='undefined'){
  try{tizen.tvinputdevice.registerKey('Back');}catch(ex){}
}

rebuildFocusable();
setFocus(0);
