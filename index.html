<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Arena News - Notícias esportivas em tempo real" />
  <title>Arena News</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');

    :root {
      --samsung-blue: #034EA2;
      --samsung-blue-light: #1565C0;
      --samsung-blue-glow: rgba(3, 78, 162, 0.6);
      --bg-primary: #0A0A0F;
      --bg-card: #111118;
      --bg-card-hover: #16161E;
      --text-primary: #F0F0F5;
      --text-secondary: #8A8A9A;
      --text-accent: #4A9FFF;
      --border-subtle: rgba(255,255,255,0.06);
      --focus-ring: #034EA2;
      --focus-glow: rgba(3, 78, 162, 0.5);
      --red-live: #E53935;
      --green-score: #43A047;
      --gold: #FFB300;
      --radius-card: 12px;
      --transition: 0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCROLLABLE WRAPPER ─────────────────────────────── */
    #app {
      width: 100vw; height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    #app::-webkit-scrollbar { width: 4px; }
    #app::-webkit-scrollbar-track { background: transparent; }
    #app::-webkit-scrollbar-thumb { background: var(--samsung-blue); border-radius: 2px; }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      height: 72px;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: var(--samsung-blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 18px;
      letter-spacing: -1px;
      color: #fff;
    }
    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 26px;
      letter-spacing: 1px;
      color: var(--text-primary);
    }
    .logo-text span { color: var(--samsung-blue); }

    .header-right {
      display: flex; align-items: center; gap: 32px;
    }

    /* Live ticker */
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600;
      color: var(--red-live);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--red-live);
      border-radius: 50%;
      animation: pulse-red 1.2s infinite;
    }
    @keyframes pulse-red {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }

    /* Clock */
    #clock {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 2px;
      min-width: 90px; text-align: right;
    }
    #clock-date {
      font-size: 11px; color: var(--text-secondary);
      letter-spacing: 1px; text-align: right;
    }

    /* ── CATEGORY BAR ───────────────────────────────────── */
    .category-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 16px 48px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border-subtle);
    }
    .category-bar::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 8px 22px;
      border-radius: 100px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      outline: none;
    }
    .cat-btn.active,
    .cat-btn:focus {
      background: var(--samsung-blue);
      border-color: var(--samsung-blue);
      color: #fff;
      box-shadow: 0 0 0 3px var(--focus-glow);
    }
    .cat-btn:hover:not(.active) {
      border-color: var(--samsung-blue);
      color: var(--text-primary);
    }

    /* ── MAIN CONTENT ───────────────────────────────────── */
    main {
      padding: 32px 48px 48px;
    }

    /* ── SECTION HEADER ─────────────────────────────────── */
    .section-header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 20px;
    }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-primary);
    }
    .section-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--samsung-blue), transparent);
    }
    .section-count {
      font-size: 12px; color: var(--text-secondary);
    }

    /* ── HERO GRID ──────────────────────────────────────── */
    .hero-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
      margin-bottom: 40px;
    }

    .hero-grid .news-card:first-child {
      grid-row: span 2;
    }

    /* ── NEWS CARDS ─────────────────────────────────────── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .news-card {
      position: relative;
      background: var(--bg-card);
      border-radius: var(--radius-card);
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .news-card:focus,
    .news-card.focused {
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 4px var(--focus-glow), 0 8px 32px rgba(0,0,0,0.5);
      transform: scale(1.03);
      z-index: 10;
    }

    .news-card:hover:not(.focused) {
      border-color: rgba(3,78,162,0.4);
      transform: scale(1.015);
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1a1a24;
    }

    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }

    .news-card.focused .card-img-wrap img,
    .news-card:hover .card-img-wrap img {
      transform: scale(1.06);
    }

    .card-category-tag {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }
    .tag-futebol  { background: rgba(3,78,162,0.85); color: #fff; }
    .tag-basquete { background: rgba(230,81,0,0.85); color: #fff; }
    .tag-tenis    { background: rgba(67,160,71,0.85); color: #fff; }
    .tag-formula  { background: rgba(183,28,28,0.85); color: #fff; }
    .tag-mma      { background: rgba(106,27,154,0.85); color: #fff; }

    .card-live-tag {
      position: absolute; top: 10px; right: 10px;
      padding: 3px 8px;
      background: var(--red-live);
      border-radius: 4px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      display: flex; align-items: center; gap: 4px;
    }
    .card-live-tag .dot {
      width: 5px; height: 5px;
      background: #fff; border-radius: 50%;
      animation: pulse-red 1s infinite;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .card-source {
      font-size: 11px; font-weight: 600;
      color: var(--text-accent);
      letter-spacing: 0.5px;
    }
    .card-time {
      font-size: 11px; color: var(--text-secondary);
    }
    .card-meta-sep { color: var(--border-subtle); font-size: 10px; }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* hero card bigger title */
    .hero-grid .news-card:first-child .card-title {
      font-size: 24px;
      -webkit-line-clamp: 4;
    }
    .hero-grid .news-card:first-child .card-body {
      padding: 20px 22px 22px;
    }
    .hero-grid .news-card:first-child .card-img-wrap {
      aspect-ratio: 16/10;
    }

    .card-desc {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── SCORES STRIP ───────────────────────────────────── */
    .scores-strip {
      margin-bottom: 40px;
    }
    .scores-row {
      display: flex; gap: 12px;
      overflow-x: hidden;
    }

    .score-card {
      flex: 0 0 auto;
      min-width: 220px;
      background: var(--bg-card);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all var(--transition);
      outline: none;
    }
    .score-card:focus,
    .score-card.focused {
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 3px var(--focus-glow);
      transform: translateY(-3px);
    }

    .score-league {
      font-size: 10px; font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .score-teams {
      display: flex; flex-direction: column; gap: 6px;
    }
    .score-team {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .team-name {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
    }
    .team-score {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
      min-width: 28px; text-align: center;
    }
    .team-score.winner { color: var(--green-score); }
    .score-status {
      margin-top: 8px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .status-live { color: var(--red-live); }
    .status-ft   { color: var(--text-secondary); }
    .status-soon { color: var(--gold); }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border-subtle);
      padding: 20px 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left {
      font-size: 12px; color: var(--text-secondary);
    }
    .footer-links {
      display: flex; gap: 24px;
    }
    .footer-links a {
      font-size: 12px; color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition);
    }
    .footer-links a:hover,
    .footer-links a:focus {
      color: var(--text-accent);
      outline: none;
    }
    .footer-version {
      font-size: 11px; color: #444;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 1px;
    }

    /* ── TICKER BAR ─────────────────────────────────────── */
    .ticker-bar {
      background: var(--samsung-blue);
      padding: 6px 0;
      overflow: hidden;
    }
    .ticker-inner {
      display: flex;
      animation: ticker-scroll 40s linear infinite;
      white-space: nowrap;
    }
    .ticker-inner:hover { animation-play-state: paused; }
    .ticker-item {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.9);
      padding: 0 40px;
      letter-spacing: 0.3px;
    }
    .ticker-sep {
      color: rgba(255,255,255,0.4);
      padding: 0 8px;
    }
    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── FOCUS INDICATOR ────────────────────────────────── */
    .focus-hint {
      position: fixed; bottom: 80px; right: 48px;
      display: flex; gap: 6px; align-items: center;
      opacity: 0.35;
      pointer-events: none;
      z-index: 200;
    }
    .dpad-key {
      width: 24px; height: 24px;
      border: 1px solid var(--text-secondary);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text-secondary);
    }

    /* ── SKELETON LOADER ────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #111118 25%, #1a1a24 50%, #111118 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.8s infinite;
      border-radius: 6px;
    }
  </style>
</head>

// ════════════════════════════════════════════════════════
//  CLOCK
// ════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('clock-date').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 1000);

// ════════════════════════════════════════════════════════
//  TICKER
// ════════════════════════════════════════════════════════
function buildTicker() {
  const items = [...TICKER_ITEMS, ...TICKER_ITEMS]; // duplicate for seamless loop
  const html = items.map(t =>
    `<span class="ticker-item">${t}</span><span class="ticker-sep">•</span>`
  ).join('');
  document.getElementById('ticker').innerHTML = html;
}
buildTicker();

// ════════════════════════════════════════════════════════
//  SCORES
// ════════════════════════════════════════════════════════
function buildScores() {
  const row = document.getElementById('scores-row');
  row.innerHTML = SCORES.map((s, i) => {
    const hw = s.sh > s.sa ? 'winner' : '';
    const aw = s.sa > s.sh ? 'winner' : '';
    const statusClass = s.status === 'live' ? 'status-live' : s.status === 'ft' ? 'status-ft' : 'status-soon';
    const statusLabel = s.status === 'live' ? `🔴 ${s.min}` : s.status === 'ft' ? 'Encerrado' : `🕐 ${s.min}`;
    return `
      <div class="score-card focusable" tabindex="0" data-idx="${i}" role="button" aria-label="${s.home} x ${s.away}">
        <div class="score-league">${s.league}</div>
        <div class="score-teams">
          <div class="score-team">
            <span class="team-name">${s.home}</span>
            <span class="team-score ${hw}">${s.sh}</span>
          </div>
          <div class="score-team">
            <span class="team-name">${s.away}</span>
            <span class="team-score ${aw}">${s.sa}</span>
          </div>
        </div>
        <div class="score-status ${statusClass}">${statusLabel}</div>
      </div>`;
  }).join('');
}
buildScores();

// ════════════════════════════════════════════════════════
//  NEWS CARDS
// ════════════════════════════════════════════════════════
function getImg(cat, idx) {
  const arr = IMAGES[cat] || IMAGES.futebol;
  return arr[idx % arr.length];
}

function buildCard(n, index, isHero) {
  const liveTag = n.live ? `<div class="card-live-tag"><div class="dot"></div>AO VIVO</div>` : '';
  return `
    <article class="news-card focusable" tabindex="0" data-idx="${index}" role="button"
      aria-label="${n.title}">
      <div class="card-img-wrap">
        <img src="${getImg(n.category, n.img)}" alt="${n.title}" loading="lazy" />
        <div class="card-category-tag tag-${n.category}">${n.category}</div>
        ${liveTag}
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-source">${n.source}</span>
          <span class="card-meta-sep">·</span>
          <span class="card-time">${n.time}</span>
        </div>
        <h3 class="card-title">${n.title}</h3>
        ${isHero ? `<p class="card-desc">${n.desc}</p>` : ''}
      </div>
    </article>`;
}

function buildHeroGrid() {
  document.getElementById('hero-grid').innerHTML = HERO_NEWS.map((n,i) => buildCard(n, i, true)).join('');
}

function buildNewsGrid() {
  document.getElementById('news-grid').innerHTML = NEWS.map((n,i) => buildCard(n, i, false)).join('');
  document.getElementById('news-count').textContent = `${NEWS.length} notícias`;
}

buildHeroGrid();
buildNewsGrid();

// ════════════════════════════════════════════════════════
//  CATEGORY FILTER
// ════════════════════════════════════════════════════════
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.category;

    const filtered = cat === 'todos' ? NEWS : NEWS.filter(n => n.category === cat);
    document.getElementById('news-grid').innerHTML = filtered.map((n,i) => buildCard(n, i, false)).join('');
    document.getElementById('news-count').textContent = `${filtered.length} notícias`;
    rebuildFocusable();
  });
});

// ════════════════════════════════════════════════════════
//  SPATIAL NAVIGATION (D-PAD)
// ════════════════════════════════════════════════════════
let focusable = [];
let focusIndex = 0;

function rebuildFocusable() {
  focusable = Array.from(document.querySelectorAll('.focusable'));
  // keep focus on a valid element
  if (focusIndex >= focusable.length) focusIndex = 0;
}

function setFocus(idx) {
  if (idx < 0 || idx >= focusable.length) return;
  focusable.forEach(el => el.classList.remove('focused'));
  focusIndex = idx;
  const el = focusable[focusIndex];
  el.classList.add('focused');
  el.focus({ preventScroll: false });
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

// Measure element center for spatial proximity
function center(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function nearestInDirection(dir) {
  const cur = focusable[focusIndex];
  const cc = center(cur);
  let best = -1, bestScore = Infinity;

  focusable.forEach((el, i) => {
    if (i === focusIndex) return;
    const ec = center(el);
    const dx = ec.x - cc.x;
    const dy = ec.y - cc.y;

    let primary, secondary;
    if (dir === 'right')  { if (dx <= 0) return; primary = dx; secondary = Math.abs(dy); }
    if (dir === 'left')   { if (dx >= 0) return; primary = -dx; secondary = Math.abs(dy); }
    if (dir === 'down')   { if (dy <= 0) return; primary = dy; secondary = Math.abs(dx); }
    if (dir === 'up')     { if (dy >= 0) return; primary = -dy; secondary = Math.abs(dx); }

    // weighted score — prefer same row/column
    const score = primary + secondary * 0.4;
    if (score < bestScore) { bestScore = score; best = i; }
  });
  return best;
}

// Tizen / TV keycodes
const KEY = {
  UP:    [38, 'ArrowUp'],
  DOWN:  [40, 'ArrowDown'],
  LEFT:  [37, 'ArrowLeft'],
  RIGHT: [39, 'ArrowRight'],
  ENTER: [13, 'Enter'],
  BACK:  [8, 10009], // Tizen back key
};

function matchKey(e, group) {
  return group.includes(e.keyCode) || group.includes(e.key);
}

document.addEventListener('keydown', e => {
  if (focusable.length === 0) return;

  if (matchKey(e, KEY.UP))    { e.preventDefault(); const t = nearestInDirection('up');    if (t >= 0) setFocus(t); }
  if (matchKey(e, KEY.DOWN))  { e.preventDefault(); const t = nearestInDirection('down');  if (t >= 0) setFocus(t); }
  if (matchKey(e, KEY.LEFT))  { e.preventDefault(); const t = nearestInDirection('left');  if (t >= 0) setFocus(t); }
  if (matchKey(e, KEY.RIGHT)) { e.preventDefault(); const t = nearestInDirection('right'); if (t >= 0) setFocus(t); }
  if (matchKey(e, KEY.ENTER)) {
    e.preventDefault();
    const el = focusable[focusIndex];
    if (el) el.click();
  }
});

// Mouse hover sync
document.addEventListener('mouseover', e => {
  const el = e.target.closest('.focusable');
  if (el) {
    const idx = focusable.indexOf(el);
    if (idx >= 0) setFocus(idx);
  }
});

// Init
rebuildFocusable();
setFocus(0);

// ════════════════════════════════════════════════════════
//  MODO DE SUPORTE TÉCNICO (Gatilho LUMI)
// ════════════════════════════════════════════════════════
let contagemCliques = 0;
let ultimoClique = 0;

function ativarModoSuporte() {
  const agora = Date.now();
  
  // Reseta a contagem se demorar mais de 2 segundos entre os cliques
  if (agora - ultimoClique > 2000) {
    contagemCliques = 0;
  }
  
  contagemCliques++;
  ultimoClique = agora;

  if (contagemCliques >= 5) {
    // Feedback visual discreto de "carregando"
    document.getElementById('version-trigger').textContent = "Iniciando Suporte...";
    document.getElementById('version-trigger').style.color = "#034EA2";
    
    setTimeout(() => {
      // REDIRECIONAMENTO: Aqui você coloca o link da sua interface LUMI
      // Quando o DNS estiver ativo, esse link pode ser o próprio domínio do Arena News
      window.location.href = "https://lumi-portal-exemplo.vercel.app"; 
    }, 1500);
  }
}

// Suporte para acionamento via controle remoto (Tecla 0 cinco vezes)
document.addEventListener('keydown', (e) => {
  if (e.key === '0' || e.keyCode === 48) {
    ativarModoSuporte();
  }
});
