<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<meta name="application-name" content="Arena"/>
<meta name="description" content="Arena — Central de resultados esportivos ao vivo para Smart TV"/>
<title>Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--bg2:#0a0a0a;--bg3:#111111;--bg4:#1a1a1a;
  --white:#ffffff;--off:#e8e8e8;--grey:#888888;--grey2:#444444;
  --red:#e53935;--red-dim:rgba(229,57,53,.18);
  --green:#22c55e;--gold:#f59e0b;
  --blue1:#1a56db;
  --border:rgba(255,255,255,0.10);
  --pill-h:52px;
  --f-display:'Montserrat',sans-serif;
  --f-body:'Inter',sans-serif;
  --flogo:34px;--fnav:20px;--fsec:24px;--fcard:19px;
  --fbody:17px;--fmeta:14px;--fsmall:12px;--fscore:56px;
  --r:12px;--tr:0.22s ease;
}
html,body{
  width:1920px;min-height:1080px;margin:0 auto;
  background:var(--bg);color:var(--white);
  font-family:var(--f-body);
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
#app{width:1920px;height:1080px;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* FOCUS */
.focusable{outline:none;transition:border-color var(--tr),box-shadow var(--tr),background var(--tr);}
.focusable.focused{border-color:var(--white)!important;box-shadow:0 0 0 2px rgba(255,255,255,.35)!important;z-index:20;position:relative;}

/* HEADER */
header{flex-shrink:0;height:88px;width:100%;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 64px;gap:56px;}
.logo{flex-shrink:0;display:flex;align-items:center;}
.logo-svg{display:block;}
.nav-wrap{flex:1;display:flex;align-items:center;position:relative;background:var(--bg3);border-radius:100px;height:var(--pill-h);padding:4px;border:1px solid var(--border);overflow:hidden;}
.nav-track{position:absolute;top:4px;bottom:4px;left:4px;background:var(--white);border-radius:100px;transition:left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:1;}
.nav-btn{position:relative;z-index:2;height:calc(var(--pill-h) - 8px);padding:0 28px;border-radius:100px;border:2px solid transparent;background:transparent;color:var(--white);font-family:var(--f-body);font-size:var(--fnav);font-weight:600;cursor:pointer;white-space:nowrap;transition:color var(--tr);outline:none;flex-shrink:0;}
.nav-btn.active{color:var(--bg)!important;}
.nav-btn.focused{border-color:var(--white)!important;box-shadow:0 0 0 2px rgba(255,255,255,.3)!important;}
.nav-btn.active.focused{border-color:rgba(0,0,0,.3)!important;box-shadow:none!important;}
.hdr-right{margin-left:auto;flex-shrink:0;text-align:right;}
#clock{font-family:var(--f-display);font-size:28px;font-weight:700;letter-spacing:2px;color:var(--white);line-height:1;font-variant-numeric:tabular-nums;}
#cdate{font-size:var(--fsmall);color:var(--grey);margin-top:3px;font-family:var(--f-body);}

/* MAIN */
#main{flex:1;overflow-y:scroll;overflow-x:hidden;padding:36px 64px 64px;}
#main::-webkit-scrollbar{width:3px;}
#main::-webkit-scrollbar-thumb{background:var(--grey2);border-radius:2px;}

/* SECTION */
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;margin-top:36px;}
.sec-head:first-child{margin-top:0;}
.sec-title{font-family:var(--f-display);font-size:var(--fsec);font-weight:800;color:var(--white);white-space:nowrap;letter-spacing:.3px;}
.sec-line{flex:1;height:1px;background:var(--border);}
.sec-badge{font-size:var(--fmeta);color:var(--grey);font-family:var(--f-body);}
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:blink 1s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.7)}}

/* MATCH CARDS */
.matches-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:12px;}
.match-card{background:var(--bg2);border-radius:var(--r);border:2px solid var(--border);cursor:pointer;outline:none;overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr);}
.match-card.focused{border-color:var(--white)!important;box-shadow:0 0 0 2px rgba(255,255,255,.25)!important;}
.mc-stripe{height:3px;width:100%;}
.stripe-live{background:linear-gradient(90deg,var(--red),#ff6b6b);}
.stripe-ft{background:var(--grey2);}
.stripe-soon{background:linear-gradient(90deg,var(--gold),#fcd34d);}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;gap:8px;}
.mc-league{font-size:var(--fsmall);font-weight:600;color:var(--grey);font-family:var(--f-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-status{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:100px;flex-shrink:0;font-family:var(--f-body);}
.status-live{background:var(--red-dim);color:var(--red);display:flex;align-items:center;gap:5px;}
.status-live .dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:blink .9s infinite;}
.status-ft{background:rgba(255,255,255,.07);color:var(--grey);}
.status-soon{background:rgba(245,158,11,.12);color:var(--gold);}
.mc-body{padding:10px 14px 14px;}
.mc-teams{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.mc-team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.mc-crest{width:52px;height:52px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.mc-crest img{width:44px;height:44px;object-fit:contain;display:block;}
.mc-crest-fb{font-size:26px;}
.mc-tname{font-size:var(--fmeta);font-weight:700;color:var(--white);text-align:center;font-family:var(--f-body);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.2;}
.mc-score-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;padding:0 6px;}
.mc-score{font-family:var(--f-display);font-size:40px;font-weight:900;color:var(--white);letter-spacing:4px;line-height:1;font-variant-numeric:tabular-nums;}
.mc-score.score-live{color:var(--red);}
.mc-score.score-soon{font-size:17px;color:var(--gold);letter-spacing:1px;font-family:var(--f-body);font-weight:700;}
.mc-min{font-size:var(--fsmall);color:var(--grey);font-weight:600;}
.mc-foot{border-top:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:6px;}
.mc-venue{font-size:11px;color:var(--grey2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--f-body);}
.mc-arrow{margin-left:auto;color:var(--grey);font-size:var(--fmeta);font-weight:700;flex-shrink:0;}

/* LOADING / ERROR / EMPTY */
.loading-state{padding:64px 0;text-align:center;font-family:var(--f-body);}
.loading-spinner{width:48px;height:48px;border:3px solid var(--grey2);border-top-color:var(--white);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:var(--fbody);color:var(--grey);}
.error-state{padding:48px 0;text-align:center;color:var(--grey);font-size:var(--fbody);font-family:var(--f-body);}
.error-icon{font-size:40px;margin-bottom:12px;}
.empty-state{padding:48px 0;text-align:center;color:var(--grey);font-size:var(--fbody);font-family:var(--f-body);}

/* FOOTER */
footer{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 64px;display:flex;align-items:center;justify-content:space-between;}
.foot-copy{font-size:var(--fsmall);color:var(--grey2);font-family:var(--f-body);}
.foot-links{display:flex;gap:24px;}
.foot-links a{font-size:var(--fsmall);font-weight:600;color:var(--grey);text-decoration:none;border-bottom:1px solid transparent;transition:all var(--tr);outline:none;padding:2px 0;font-family:var(--f-body);}
.foot-links a[href="privacy.html"]{color:var(--off);}
.foot-links a.focused,.foot-links a:focus{color:var(--white);border-bottom-color:var(--white);outline:none;}
.foot-ver{font-size:11px;color:var(--grey2);font-family:monospace;letter-spacing:1px;}

/* DRAWER */
#drawer-overlay{position:fixed;inset:0;z-index:500;background:transparent;pointer-events:none;transition:background .3s ease;}
#drawer-overlay.open{background:rgba(0,0,0,.7);pointer-events:auto;}
#drawer{position:fixed;top:0;right:0;bottom:0;width:520px;z-index:501;background:#0a0a0a;border-left:1px solid rgba(255,255,255,.12);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;}
#drawer::-webkit-scrollbar{width:3px;}
#drawer::-webkit-scrollbar-thumb{background:var(--grey2);}
#drawer.open{transform:translateX(0);}
.dr-header{padding:28px 32px 20px;border-bottom:1px solid var(--border);background:#0d0d0d;position:sticky;top:0;z-index:10;}
.dr-back{font-size:var(--fmeta);color:var(--grey);margin-bottom:14px;font-family:var(--f-body);}
.dr-competition{font-family:var(--f-display);font-size:var(--fsmall);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:4px;}
.dr-phase{font-size:var(--fbody);color:var(--white);font-weight:600;margin-bottom:2px;}
.dr-venue{font-size:var(--fmeta);color:var(--grey);}
.dr-score-block{padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.dr-teams-row{display:flex;align-items:center;justify-content:space-between;width:100%;gap:12px;}
.dr-club{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;}
.dr-crest{width:72px;height:72px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);overflow:hidden;}
.dr-crest img{width:60px;height:60px;object-fit:contain;}
.dr-crest-fb{font-size:38px;}
.dr-cname{font-family:var(--f-display);font-size:var(--fcard);font-weight:800;color:var(--white);text-align:center;}
.dr-score-center{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;}
.dr-score{font-family:var(--f-display);font-size:var(--fscore);font-weight:900;letter-spacing:6px;color:var(--white);font-variant-numeric:tabular-nums;line-height:1;}
.dr-score.live{color:var(--red);}
.dr-score.soon{font-size:22px;color:var(--gold);letter-spacing:2px;font-family:var(--f-body);}
.dr-status-badge{font-size:var(--fsmall);font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:100px;font-family:var(--f-body);}
.dsb-live{background:var(--red-dim);color:var(--red);}
.dsb-ft{background:rgba(255,255,255,.07);color:var(--grey);}
.dsb-soon{background:rgba(245,158,11,.12);color:var(--gold);}
.dr-min{font-size:var(--fmeta);color:var(--red);font-weight:700;}
.dr-info-block{padding:20px 32px;border-bottom:1px solid var(--border);}
.dr-info-title{font-family:var(--f-display);font-size:var(--fsmall);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:12px;}
.dr-info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.dr-info-row:last-child{border-bottom:none;}
.dr-il{font-size:var(--fmeta);color:var(--grey);}
.dr-iv{font-size:var(--fmeta);font-weight:600;color:var(--white);text-align:right;}
.dr-stat-block{padding:20px 32px;border-bottom:1px solid var(--border);}
.dr-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dr-stat-lbl{font-size:var(--fsmall);color:var(--grey);width:120px;flex-shrink:0;}
.dr-stat-bar-wrap{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.dr-stat-bar{height:100%;background:var(--white);border-radius:3px;transition:width .4s ease;}
.dr-stat-val{font-size:var(--fsmall);font-weight:700;color:var(--white);width:40px;text-align:right;flex-shrink:0;}
.dr-lineup-block{padding:20px 32px;}
.dr-lu-title{font-family:var(--f-display);font-size:var(--fsmall);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:16px;}
.dr-lu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.dr-lu-tname{font-family:var(--f-display);font-size:var(--fbody);font-weight:800;color:var(--white);margin-bottom:10px;}
.dr-player{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.dr-pnum{font-size:var(--fmeta);font-weight:700;color:var(--grey);width:22px;text-align:center;flex-shrink:0;}
.dr-pname{font-size:var(--fbody);color:var(--white);font-family:var(--f-body);}
.dr-ppos{font-size:var(--fsmall);color:var(--grey);margin-left:auto;font-family:var(--f-body);}

/* RESPONSIVE 720p */
@media(max-width:1280px){
  body{width:1280px;}#app{height:720px;}
  :root{--flogo:24px;--fnav:16px;--fsec:18px;--fcard:15px;--fbody:13px;--fmeta:11px;--fsmall:10px;--fscore:40px;}
  header{height:68px;padding:0 40px;gap:32px;}
  #main{padding:24px 40px 40px;}
  footer{padding:10px 40px;}
  .matches-grid{grid-template-columns:repeat(3,1fr);}
  #drawer{width:400px;}
}

/* ═══════════════════════════════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  /* starts fully visible, fades out via JS class */
  opacity:1;
  transition:opacity .7s cubic-bezier(.4,0,.2,1);
}
#splash.hide{opacity:0;pointer-events:none;}

/* ── Arc icon ─────────────────────────────────────────────── */
.sp-icon{
  width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
  position:relative;
}

/* Outer rotating ring */
.sp-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color:#1e90ff;
  border-right-color:rgba(30,144,255,.35);
  animation:ring-spin 1.6s linear infinite;
}
.sp-ring-2{
  position:absolute;inset:10px;
  border-radius:50%;
  border:2px solid transparent;
  border-bottom-color:#1e90ff;
  border-left-color:rgba(30,144,255,.2);
  animation:ring-spin 2.4s linear infinite reverse;
}
@keyframes ring-spin{to{transform:rotate(360deg)}}

/* Centre glow dot */
.sp-dot{
  width:28px;height:28px;
  border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#1e90ff 55%,transparent 100%);
  animation:dot-pulse 1.4s ease-in-out infinite;
}
@keyframes dot-pulse{
  0%,100%{transform:scale(1);  box-shadow:0 0 0   0   rgba(30,144,255,.7);}
  50%    {transform:scale(1.25);box-shadow:0 0 24px 8px rgba(30,144,255,.35);}
}

/* ── ARENA text ───────────────────────────────────────────── */
.sp-logo-wrap{
  display:flex;flex-direction:column;align-items:center;gap:0;
  animation:logo-in .9s cubic-bezier(.22,1,.36,1) both;
  animation-delay:.15s;
}
@keyframes logo-in{
  from{opacity:0;transform:translateY(18px) scale(.94);}
  to  {opacity:1;transform:translateY(0)    scale(1);}
}

.sp-arc{
  /* arc drawn with CSS — simple top border */
  width:200px;height:20px;
  position:relative;
  margin-bottom:-4px;
}
.sp-arc::before{
  content:'';
  position:absolute;
  left:16px;right:16px;top:0;
  height:18px;
  border-top:3px solid;
  border-image:linear-gradient(90deg,#1a56db,#60a5fa,#fff) 1;
  border-radius:60% 60% 0 0 / 100% 100% 0 0;
  opacity:.85;
}
.sp-arc-dot{
  position:absolute;left:50%;top:-5px;
  transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;
  background:#1a56db;
  box-shadow:0 0 10px 3px rgba(26,86,219,.8);
}

.sp-name{
  font-family:'Montserrat',sans-serif;
  font-size:72px;font-weight:900;
  letter-spacing:14px;
  background:linear-gradient(90deg,#60a5fa 0%,#fff 60%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
  text-shadow:none;
}

.sp-tagline{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:500;
  letter-spacing:4px;
  color:rgba(255,255,255,.38);
  text-transform:uppercase;
  margin-top:10px;
}

/* ── Loading bar ──────────────────────────────────────────── */
.sp-loader{
  margin-top:56px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  animation:loader-in .5s ease both;
  animation-delay:.7s;
  opacity:0;
}
@keyframes loader-in{
  from{opacity:0;transform:translateY(8px);}
  to  {opacity:1;transform:translateY(0);}
}

.sp-bar-track{
  width:280px;height:3px;
  background:rgba(255,255,255,.08);
  border-radius:2px;
  overflow:hidden;
  position:relative;
}
.sp-bar-fill{
  position:absolute;top:0;left:0;bottom:0;
  width:0%;
  background:linear-gradient(90deg,#1e90ff,#60c0ff);
  border-radius:2px;
  animation:bar-fill 2s cubic-bezier(.4,0,.2,1) .8s forwards;
  box-shadow:0 0 8px rgba(30,144,255,.6);
}
@keyframes bar-fill{
  0%  {width:0%;}
  40% {width:55%;}
  70% {width:78%;}
  90% {width:92%;}
  100%{width:100%;}
}

.sp-loader-text{
  font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;
  letter-spacing:2px;
  color:rgba(255,255,255,.3);
  text-transform:uppercase;
}

/* ── App hidden until splash ends ────────────────────────── */
#app{
  opacity:0;
  /* app fades in after splash */
}
#app.app-visible{
  opacity:1;
  transition:opacity .5s ease .1s;
}

/* ── App element entry animations ────────────────────────── */
/* Header slides down */
#app.app-visible header{
  animation:hdr-in .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes hdr-in{
  from{opacity:0;transform:translateY(-24px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Nav buttons stagger */
#app.app-visible .nav-btn{
  animation:nav-btn-in .4s cubic-bezier(.22,1,.36,1) both;
}
#app.app-visible .nav-btn:nth-child(2) {animation-delay:.04s;}
#app.app-visible .nav-btn:nth-child(3) {animation-delay:.08s;}
#app.app-visible .nav-btn:nth-child(4) {animation-delay:.12s;}
#app.app-visible .nav-btn:nth-child(5) {animation-delay:.16s;}
#app.app-visible .nav-btn:nth-child(6) {animation-delay:.20s;}
#app.app-visible .nav-btn:nth-child(7) {animation-delay:.24s;}
#app.app-visible .nav-btn:nth-child(8) {animation-delay:.28s;}
@keyframes nav-btn-in{
  from{opacity:0;transform:translateY(-10px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Main content rises up */
#app.app-visible #main{
  animation:main-in .55s cubic-bezier(.22,1,.36,1) .12s both;
}
@keyframes main-in{
  from{opacity:0;transform:translateY(28px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Match cards stagger fade-up */
#app.app-visible .match-card{
  animation:card-in .45s cubic-bezier(.22,1,.36,1) both;
}
/* Cards get stagger delay via JS after render — see boot */

/* Footer slides up */
#app.app-visible footer{
  animation:foot-in .4s cubic-bezier(.22,1,.36,1) .2s both;
}
@keyframes foot-in{
  from{opacity:0;transform:translateY(16px);}
  to  {opacity:1;transform:translateY(0);}
}

@keyframes card-in{
  from{opacity:0;transform:translateY(20px);}
  to  {opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<!-- ══ SPLASH SCREEN ════════════════════════════════════════ -->
<div id="splash" role="status" aria-label="Carregando Arena Sports">

  <!-- Animated icon -->
  <div class="sp-icon">
    <div class="sp-ring"></div>
    <div class="sp-ring-2"></div>
    <div class="sp-dot"></div>
  </div>

  <!-- Logo -->
  <div class="sp-logo-wrap">
    <div class="sp-arc">
      <div class="sp-arc-dot"></div>
    </div>
    <div class="sp-name">ARENA</div>
    <div class="sp-tagline">Sports Live Center</div>
  </div>

  <!-- Loading bar -->

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   API-FOOTBALL
   Base URL : https://v3.football.api-sports.io
   Chave    : x-apisports-key header
   Proxy    : se a TV bloquear por CORS, mude USE_PROXY para true
═══════════════════════════════════════════════════════════════ */
var API_KEY   = 'e19c21998bd99cdc73d7d013ccdd4e3a';
var API_BASE  = 'https://v3.football.api-sports.io';
var PROXY     = 'https://api.allorigins.win/raw?url=';
var USE_PROXY = false;

/* NBA — mockado (API-Football não cobre NBA no plano gratuito) */
var NBA_MOCK = [
  { id:'nba1', apiId:null, league:'NBA — Conf. Leste', phase:'Temporada Regular', season:'2024-25',
    home:{name:'Celtics', logo:'https://www.thesportsdb.com/images/media/team/badge/squuqy1423014297.png'},
    away:{name:'Heat',    logo:'https://www.thesportsdb.com/images/media/team/badge/urpxvr1423014260.png'},
    status:'soon', min:'00:30', score:{h:0,a:0}, venue:'TD Garden, Boston', city:'Boston', date:'Hoje', time:'00:30' },
  { id:'nba2', apiId:null, league:'NBA — Conf. Oeste', phase:'Temporada Regular', season:'2024-25',
    home:{name:'Lakers',  logo:'https://www.thesportsdb.com/images/media/team/badge/sqrtqy1423014256.png'},
    away:{name:'Warriors',logo:'https://www.thesportsdb.com/images/media/team/badge/stsvqy1423014229.png'},
    status:'soon', min:'02:30', score:{h:0,a:0}, venue:'Chase Center, San Francisco', city:'San Francisco', date:'Hoje', time:'02:30' },
  { id:'nba3', apiId:null, league:'NBA — Conf. Oeste', phase:'Temporada Regular', season:'2024-25',
    home:{name:'Nuggets', logo:'https://www.thesportsdb.com/images/media/team/badge/ctsrqy1423014266.png'},
    away:{name:'Thunder', logo:'https://www.thesportsdb.com/images/media/team/badge/sqrwqr1423014261.png'},
    status:'soon', min:'03:00', score:{h:0,a:0}, venue:'Ball Arena, Denver', city:'Denver', date:'Hoje', time:'03:00' }
];

/* Labels do nav */
var LABELS = {
  all:'Jogos de Hoje', live:'Jogos Ao Vivo',
  champions:'Champions League', premier:'Premier League',
  laliga:'La Liga', serie_a:'Serie A', bundesliga:'Bundesliga',
  ligue1:'Ligue 1', brasileirao:'Brasileirão', libertadores:'Libertadores',
  saudi:'Saudi Pro League', nba:'NBA'
};

/* ═══════════════════════════════════════════════════════════════
   CACHE EM MEMÓRIA — 5 minutos
═══════════════════════════════════════════════════════════════ */
var cache    = {};
var CACHE_TTL = 5 * 60 * 1000;

function cacheGet(key) {
  var e = cache[key];
  if (!e) return null;
  if (Date.now() - e.ts > CACHE_TTL) { delete cache[key]; return null; }
  return e.data;
}
function cacheSet(key, data) { cache[key] = { ts: Date.now(), data: data }; }

/* ═══════════════════════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════════════════════ */
async function apiFetch(path) {
  var url = API_BASE + path;
  if (USE_PROXY) {
    var sep = path.indexOf('?') >= 0 ? '&' : '?';
    url = PROXY + encodeURIComponent(url + sep + 'x-apisports-key=' + API_KEY);
    var r = await fetch(url, { mode: 'cors' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  }
  var r = await fetch(url, {
    mode: 'cors',
    headers: { 'x-apisports-key': API_KEY, 'Accept': 'application/json' }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return await r.json();
}

/* ═══════════════════════════════════════════════════════════════
   NORMALIZAÇÃO — fixture API-Football → formato interno
═══════════════════════════════════════════════════════════════ */
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function normalizeFixture(fix) {
  var s = fix.fixture.status.short;
  var status;
  if (['1H','2H','ET','P','BT','HT','LIVE'].indexOf(s) >= 0) status = 'live';
  else if (['FT','AET','PEN','CANC','PST','ABD','AWD','WO'].indexOf(s) >= 0) status = 'ft';
  else status = 'soon';

  var elapsed = fix.fixture.status.elapsed;
  var min;
  if (status === 'live')       min = s === 'HT' ? 'HT' : (elapsed || '?') + "'";
  else if (status === 'ft')    min = 'FT';
  else {
    try {
      var d = new Date(fix.fixture.date);
      min = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    } catch(e) { min = '--:--'; }
  }

  var g = fix.goals || {};
  var dateFmt = '';
  try {
    var dd = new Date(fix.fixture.date);
    dateFmt = String(dd.getDate()).padStart(2,'0') + '/'
            + String(dd.getMonth()+1).padStart(2,'0') + '/'
            + dd.getFullYear();
  } catch(e) {}

  return {
    id:     'af_' + fix.fixture.id,
    apiId:  fix.fixture.id,
    league: fix.league.name || '',
    phase:  fix.league.round || '',
    season: String(fix.league.season || ''),
    home: { name: fix.teams.home.name || '', logo: fix.teams.home.logo || '' },
    away: { name: fix.teams.away.name || '', logo: fix.teams.away.logo || '' },
    status: status,
    min:    min,
    score: {
      h: (status !== 'soon' && g.home !== null && g.home !== undefined) ? g.home : 0,
      a: (status !== 'soon' && g.away !== null && g.away !== undefined) ? g.away : 0
    },
    venue:  (fix.fixture.venue && fix.fixture.venue.name)
              ? fix.fixture.venue.name + (fix.fixture.venue.city ? ', ' + fix.fixture.venue.city : '')
              : '—',
    city:   (fix.fixture.venue && fix.fixture.venue.city) ? fix.fixture.venue.city : '',
    date:   dateFmt,
    time:   min
  };
}

/* ═══════════════════════════════════════════════════════════════
   CARREGADORES
═══════════════════════════════════════════════════════════════ */

/* Jogos do dia */
async function loadToday() {
  var today = todayStr();
  var key   = 'today_' + today;
  var hit   = cacheGet(key); if (hit) return hit;
  var data  = await apiFetch('/fixtures?date=' + today);
  var list  = (data.response || []).map(normalizeFixture);
  cacheSet(key, list);
  return list;
}

/* Jogos ao vivo */
async function loadLive() {
  var key = 'live_short';
  var hit = cacheGet(key); if (hit) return hit;
  var data = await apiFetch('/fixtures?live=all');
  var list = (data.response || []).map(normalizeFixture);
  /* TTL curto: 30s */
  cache[key] = { ts: Date.now() - (CACHE_TTL - 30000), data: list };
  return list;
}

/* Liga específica: hoje, com fallback ±7 dias */
async function loadLeague(leagueId, season) {
  var today = todayStr();
  var key   = 'league_' + leagueId + '_' + season + '_' + today;
  var hit   = cacheGet(key); if (hit) return hit;

  /* Tenta dia exato primeiro */
  var data = await apiFetch('/fixtures?league=' + leagueId + '&season=' + season + '&date=' + today);
  var list = (data.response || []).map(normalizeFixture);

  /* Se não tiver nada hoje, busca janela de ±7 dias */
  if (list.length === 0) {
    var d1 = new Date(); d1.setDate(d1.getDate() - 7);
    var d2 = new Date(); d2.setDate(d2.getDate() + 7);
    var from = d1.toISOString().slice(0,10);
    var to   = d2.toISOString().slice(0,10);
    var data2 = await apiFetch('/fixtures?league=' + leagueId + '&season=' + season + '&from=' + from + '&to=' + to);
    list = (data2.response || []).map(normalizeFixture);
  }

  cacheSet(key, list);
  return list;
}

/* Escalação */
async function loadLineups(fixtureId) {
  var key = 'lineup_' + fixtureId;
  var hit = cacheGet(key); if (hit) return hit;
  try {
    var data = await apiFetch('/fixtures/lineups?fixture=' + fixtureId);
    var result = data.response || [];
    cacheSet(key, result);
    return result;
  } catch(e) { return []; }
}

/* Estatísticas */
async function loadStats(fixtureId) {
  var key = 'stats_' + fixtureId;
  var hit = cacheGet(key); if (hit) return hit;
  try {
    var data = await apiFetch('/fixtures/statistics?fixture=' + fixtureId);
    var result = data.response || [];
    cacheSet(key, result);
    return result;
  } catch(e) { return []; }
}

/* ═══════════════════════════════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════════════════════════════ */
function stripeClass(s) { return s==='live'?'stripe-live':s==='ft'?'stripe-ft':'stripe-soon'; }

function statusHtml(m) {
  if (m.status==='live') return '<div class="mc-status status-live"><div class="dot"></div>AO VIVO ' + m.min + '</div>';
  if (m.status==='ft')   return '<div class="mc-status status-ft">Encerrado</div>';
  return '<div class="mc-status status-soon">' + m.min + '</div>';
}

function scoreHtml(m) {
  if (m.status==='soon')
    return '<div class="mc-score score-soon">' + m.min + '</div>'
         + '<div class="mc-min">' + m.date + '</div>';
  var cls = m.status==='live' ? ' score-live' : '';
  return '<div class="mc-score' + cls + '">'
       + m.score.h + '<span style="color:var(--grey2);margin:0 2px;font-size:28px;">:</span>' + m.score.a
       + '</div>'
       + '<div class="mc-min">' + (m.status==='live' ? m.min : 'FT') + '</div>';
}

function crestHtml(team) {
  return team.logo
    ? '<div class="mc-crest"><img src="' + team.logo + '" alt="' + team.name + '" loading="lazy"/></div>'
    : '<div class="mc-crest"><span class="mc-crest-fb">⚽</span></div>';
}

function drCrestHtml(team) {
  return team.logo
    ? '<div class="dr-crest"><img src="' + team.logo + '" alt="' + team.name + '"/></div>'
    : '<div class="dr-crest"><span class="dr-crest-fb">⚽</span></div>';
}

function renderMatches(list) {
  var grid  = document.getElementById('matches-grid');
  var count = document.getElementById('match-count');

  if (!list || list.length === 0) {
    grid.innerHTML  = '<div class="empty-state" style="grid-column:1/-1">Nenhum jogo encontrado.</div>';
    count.textContent = '';
    rebuildZones(); detectCols();
    return;
  }

  var h = '';
  for (var i = 0; i < list.length; i++) {
    var m = list[i];
    h += '<div class="match-card focusable" tabindex="0" role="button"'
       + ' data-idx="' + i + '" aria-label="' + m.home.name + ' x ' + m.away.name + '">'
       + '<div class="mc-stripe ' + stripeClass(m.status) + '"></div>'
       + '<div class="mc-head"><span class="mc-league">' + m.league + '</span>' + statusHtml(m) + '</div>'
       + '<div class="mc-body"><div class="mc-teams">'
       + '<div class="mc-team">' + crestHtml(m.home) + '<div class="mc-tname">' + m.home.name + '</div></div>'
       + '<div class="mc-score-col">' + scoreHtml(m) + '</div>'
       + '<div class="mc-team">' + crestHtml(m.away) + '<div class="mc-tname">' + m.away.name + '</div></div>'
       + '</div></div>'
       + '<div class="mc-foot"><span class="mc-venue">' + m.venue + '</span><span class="mc-arrow">Detalhes ›</span></div>'
       + '</div>';
  }

  grid.innerHTML    = h;
  count.textContent = list.length + ' jogos';

  /* re-bind click */
  grid.addEventListener('click', function(e) {
    var card = e.target.closest('.match-card');
    if (!card) return;
    var idx = parseInt(card.getAttribute('data-idx'), 10);
    if (idx >= 0 && currentFixtures[idx]) {
      drawerSrcIdx = gridEls.indexOf(card);
      openDrawer(currentFixtures[idx]);
    }
  }, { once: true });

  rebuildZones(); detectCols();
  gridIndex = 0; savedGridCol = 0;
}

function showLoading(title) {
  document.getElementById('main-title').textContent = title || 'Carregando...';
  document.getElementById('matches-grid').innerHTML =
    '<div class="loading-state" style="grid-column:1/-1">'
    + '<div class="loading-spinner"></div>'
    + '<div class="loading-text">Carregando jogos...</div></div>';
  rebuildZones();
}

function showError(msg) {
  document.getElementById('matches-grid').innerHTML =
    '<div class="error-state" style="grid-column:1/-1">'
    + '<div class="error-icon">⚠️</div><div>' + msg + '</div></div>';
  document.getElementById('match-count').textContent = '';
  rebuildZones();
}

/* ═══════════════════════════════════════════════════════════════
   FIXTURE STORE
═══════════════════════════════════════════════════════════════ */
var currentFixtures = [];

/* ═══════════════════════════════════════════════════════════════
   LOAD FILTER
═══════════════════════════════════════════════════════════════ */
async function loadFilter(filter, leagueId, season) {
  var lbl = LABELS[filter] || filter;
  showLoading(lbl);
  document.getElementById('main-title').textContent = lbl;
  document.getElementById('live-dot').style.display = filter === 'live' ? 'block' : 'none';

  try {
    var list = [];

    if (filter === 'nba') {
      list = NBA_MOCK;
    } else if (filter === 'live') {
      list = await loadLive();
    } else if (filter === 'all') {
      list = await loadToday();
    } else if (leagueId) {
      list = await loadLeague(leagueId, season);
    }

    /* Ordenar: ao vivo → agendados → encerrados */
    list.sort(function(a, b) {
      var o = { live:0, soon:1, ft:2 };
      return (o[a.status] || 1) - (o[b.status] || 1);
    });

    currentFixtures = list;
    renderMatches(list);

    rebuildZones(); detectCols();
    if (gridEls.length > 0) enterGrid(0);

  } catch(err) {
    console.error('[Arena]', err);
    showError('Não foi possível carregar os jogos agora.<br>Verifique sua conexão e tente novamente.');
  }
}

/* ═══════════════════════════════════════════════════════════════
   DRAWER
═══════════════════════════════════════════════════════════════ */
var drawerOpen   = false;
var drawerSrcIdx = -1;
var drawerEl     = document.getElementById('drawer');
var overlayEl    = document.getElementById('drawer-overlay');

function openDrawer(m) {
  if (!m) return;

  var scoreTxt, scoreCls, statusCls, statusTxt, minHtml = '';
  if (m.status === 'live') {
    scoreTxt  = m.score.h + ' : ' + m.score.a; scoreCls = 'live';
    statusCls = 'dsb-live'; statusTxt = '● AO VIVO';
    minHtml   = '<div class="dr-min">' + m.min + '</div>';
  } else if (m.status === 'ft') {
    scoreTxt  = m.score.h + ' : ' + m.score.a; scoreCls = '';
    statusCls = 'dsb-ft'; statusTxt = 'Encerrado';
  } else {
    scoreTxt  = m.time || '--:--'; scoreCls = 'soon';
    statusCls = 'dsb-soon'; statusTxt = 'Agendado';
  }

  drawerEl.innerHTML =
    '<div class="dr-header">'
    + '<div class="dr-back">← Pressione VOLTAR para fechar</div>'
    + '<div class="dr-competition">' + m.league + '</div>'
    + '<div class="dr-phase">' + (m.phase || '') + (m.season ? ' · ' + m.season : '') + '</div>'
    + '<div class="dr-venue">' + m.venue + '</div>'
    + '</div>'
    + '<div class="dr-score-block">'
    + '<div class="dr-teams-row">'
    + '<div class="dr-club">' + drCrestHtml(m.home) + '<div class="dr-cname">' + m.home.name + '</div></div>'
    + '<div class="dr-score-center">'
    + '<div class="dr-score ' + scoreCls + '">' + scoreTxt + '</div>'
    + '<div class="dr-status-badge ' + statusCls + '">' + statusTxt + '</div>'
    + minHtml
    + '</div>'
    + '<div class="dr-club">' + drCrestHtml(m.away) + '<div class="dr-cname">' + m.away.name + '</div></div>'
    + '</div>'
    + '</div>'
    + '<div class="dr-info-block">'
    + '<div class="dr-info-title">Informações da Partida</div>'
    + '<div class="dr-info-row"><span class="dr-il">Competição</span><span class="dr-iv">' + m.league + '</span></div>'
    + (m.phase  ? '<div class="dr-info-row"><span class="dr-il">Fase</span><span class="dr-iv">' + m.phase + '</span></div>' : '')
    + (m.season ? '<div class="dr-info-row"><span class="dr-il">Temporada</span><span class="dr-iv">' + m.season + '</span></div>' : '')
    + '<div class="dr-info-row"><span class="dr-il">Estádio</span><span class="dr-iv">' + m.venue + '</span></div>'
    + (m.city   ? '<div class="dr-info-row"><span class="dr-il">Cidade</span><span class="dr-iv">' + m.city + '</span></div>' : '')
    + '<div class="dr-info-row"><span class="dr-il">Data</span><span class="dr-iv">' + m.date + '</span></div>'
    + (m.status === 'soon' ? '<div class="dr-info-row"><span class="dr-il">Horário</span><span class="dr-iv">' + m.time + '</span></div>' : '')
    + '</div>'
    + '<div id="dr-extra">'
    + (m.apiId ? '<div style="padding:24px 32px;text-align:center;"><div class="loading-spinner" style="width:28px;height:28px;border-width:2px;margin-bottom:8px;"></div><div style="font-size:var(--fmeta);color:var(--grey);">Carregando detalhes...</div></div>' : '')
    + '</div>';

  drawerEl.classList.add('open');
  overlayEl.classList.add('open');
  drawerEl.scrollTop = 0;
  drawerOpen = true;

  /* Busca escalação + stats para jogos reais */
  if (m.apiId) {
    Promise.all([ loadLineups(m.apiId), loadStats(m.apiId) ])
      .then(function(res) {
        var el = document.getElementById('dr-extra');
        if (el) renderDrawerExtra(res[0], res[1], el);
      })
      .catch(function() {
        var el = document.getElementById('dr-extra');
        if (el) el.innerHTML = '';
      });
  }
}

function renderDrawerExtra(lineups, stats, el) {
  var html = '';

  /* Estatísticas */
  if (stats && stats.length >= 2) {
    var sH = stats[0].statistics || [];
    var sA = stats[1].statistics || [];
    var keys    = ['Ball Possession','Total Shots','Shots on Goal','Fouls','Corner Kicks'];
    var ptLabels = {
      'Ball Possession':'Posse de Bola','Total Shots':'Total de Chutes',
      'Shots on Goal':'Chutes a Gol','Fouls':'Faltas','Corner Kicks':'Escanteios'
    };
    var rows = '';
    for (var si = 0; si < keys.length; si++) {
      var lbl = keys[si];
      var hV = '', aV = '';
      for (var k = 0; k < sH.length; k++) if (sH[k].type === lbl) { hV = String(sH[k].value || '0'); break; }
      for (var l = 0; l < sA.length; l++) if (sA[l].type === lbl) { aV = String(sA[l].value || '0'); break; }
      if (!hV && !aV) continue;
      var hN = parseInt(hV.replace('%',''), 10) || 0;
      var aN = parseInt(aV.replace('%',''), 10) || 0;
      var hPct = Math.round(hN / (hN + aN || 1) * 100);
      rows += '<div class="dr-stat-row">'
            + '<span class="dr-stat-lbl">' + (ptLabels[lbl] || lbl) + '</span>'
            + '<span class="dr-stat-val" style="text-align:left">' + hV + '</span>'
            + '<div class="dr-stat-bar-wrap"><div class="dr-stat-bar" style="width:' + hPct + '%"></div></div>'
            + '<span class="dr-stat-val">' + aV + '</span>'
            + '</div>';
    }
    if (rows) {
      html += '<div class="dr-stat-block">'
            + '<div class="dr-info-title">Estatísticas</div>'
            + '<div class="dr-stat-row" style="margin-bottom:6px">'
            + '<span class="dr-stat-lbl"></span>'
            + '<span class="dr-stat-val" style="color:var(--grey);text-align:left;font-size:10px;">' + ((stats[0].team && stats[0].team.name) || 'Casa') + '</span>'
            + '<div class="dr-stat-bar-wrap"></div>'
            + '<span class="dr-stat-val" style="color:var(--grey);font-size:10px;">' + ((stats[1].team && stats[1].team.name) || 'Fora') + '</span>'
            + '</div>' + rows + '</div>';
    }
  }

  /* Escalações */
  if (lineups && lineups.length >= 1) {
    var lu = '<div class="dr-lineup-block"><div class="dr-lu-title">Escalação Titular</div><div class="dr-lu-grid">';
    for (var ti = 0; ti < Math.min(lineups.length, 2); ti++) {
      var team    = lineups[ti];
      var players = team.startXI || [];
      lu += '<div class="dr-lu-team"><div class="dr-lu-tname">' + ((team.team && team.team.name) || '') + '</div>';
      for (var pi = 0; pi < players.length; pi++) {
        var p = players[pi].player || players[pi];
        lu += '<div class="dr-player">'
            + '<span class="dr-pnum">' + (p.number || '') + '</span>'
            + '<span class="dr-pname">' + (p.name   || '') + '</span>'
            + '<span class="dr-ppos">'  + (p.pos    || '') + '</span>'
            + '</div>';
      }
      lu += '</div>';
    }
    lu += '</div></div>';
    html += lu;
  }

  el.innerHTML = html || '';
}

function closeDrawer() {
  drawerEl.classList.remove('open');
  overlayEl.classList.remove('open');
  drawerOpen = false;
  if (drawerSrcIdx >= 0 && drawerSrcIdx < gridEls.length) {
    gridIndex    = drawerSrcIdx;
    savedGridCol = gridIndex % COLS;
    enterGrid();
  } else if (gridEls.length > 0) {
    enterGrid(0);
  } else {
    enterNav(navIndex);
  }
}

overlayEl.addEventListener('click', function() { if (drawerOpen) closeDrawer(); });

/* ═══════════════════════════════════════════════════════════════
   RELÓGIO
═══════════════════════════════════════════════════════════════ */
var DIAS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function tick() {
  var d = new Date();
  document.getElementById('clock').textContent  = pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
  document.getElementById('cdate').textContent  = DIAS[d.getDay()] + ', ' + d.getDate() + ' ' + MESES[d.getMonth()] + ' ' + d.getFullYear();
}
tick();
setInterval(tick, 1000);

/* Auto-refresh a cada 60s para Todos / Ao Vivo */
setInterval(function() {
  var btn = document.querySelector('.nav-btn.active');
  if (!btn || drawerOpen) return;
  var f = btn.getAttribute('data-filter');
  if (f === 'all' || f === 'live') {
    delete cache['today_' + todayStr()];
    delete cache['live_short'];
    loadFilter(f, btn.getAttribute('data-league'), btn.getAttribute('data-season'));
  }
}, 60000);

/* ═══════════════════════════════════════════════════════════════
   NAV PILL SLIDER
═══════════════════════════════════════════════════════════════ */
var navBtns = document.querySelectorAll('.nav-btn');
var track   = document.getElementById('nav-track');

function updateTrack(btn) {
  var wrap = document.getElementById('nav-wrap');
  var wR = wrap.getBoundingClientRect();
  var bR = btn.getBoundingClientRect();
  track.style.left  = (bR.left - wR.left) + 'px';
  track.style.width = bR.width + 'px';
}
setTimeout(function() {
  var a = document.querySelector('.nav-btn.active');
  if (a) updateTrack(a);
}, 60);

for (var ni = 0; ni < navBtns.length; ni++) {
  navBtns[ni].addEventListener('click', (function(btn) {
    return function() {
      for (var j = 0; j < navBtns.length; j++) navBtns[j].classList.remove('active');
      btn.classList.add('active');
      updateTrack(btn);
      loadFilter(
        btn.getAttribute('data-filter'),
        btn.getAttribute('data-league'),
        btn.getAttribute('data-season')
      );
    };
  })(navBtns[ni]));
}

/* ═══════════════════════════════════════════════════════════════
   NAVEGAÇÃO POR ZONAS (D-PAD) — estilo Netflix
═══════════════════════════════════════════════════════════════ */
var ZONE_NAV    = 'nav';
var ZONE_GRID   = 'grid';
var ZONE_FOOTER = 'footer';

var currentZone  = ZONE_NAV;
var navIndex     = 0;
var gridIndex    = 0;
var footerIndex  = 0;
var savedGridCol = 0;
var COLS         = 4;

var navEls    = [];
var gridEls   = [];
var footerEls = [];
var mainEl    = document.getElementById('main');

function rebuildZones() {
  navEls    = Array.prototype.slice.call(document.querySelectorAll('.nav-btn'));
  gridEls   = Array.prototype.slice.call(document.querySelectorAll('#matches-grid .match-card'));
  footerEls = Array.prototype.slice.call(document.querySelectorAll('footer .focusable'));
  if (navIndex    >= navEls.length)    navIndex    = 0;
  if (gridIndex   >= gridEls.length)   gridIndex   = 0;
  if (footerIndex >= footerEls.length) footerIndex = 0;
}
function rebuildFocusable() { rebuildZones(); }

function clearAllFocus() {
  var all = navEls.concat(gridEls).concat(footerEls);
  for (var i = 0; i < all.length; i++) all[i].classList.remove('focused');
}

function applyFocusEl(el) {
  clearAllFocus();
  el.classList.add('focused');
  el.focus({ preventScroll: true });
  scrollIntoView(el);
}

function scrollIntoView(el) {
  if (!el) return;
  var r  = el.getBoundingClientRect();
  var mr = mainEl.getBoundingClientRect();
  if (r.bottom > mr.bottom - 20) mainEl.scrollTop += r.bottom - mr.bottom + 40;
  if (r.top    < mr.top    + 20) mainEl.scrollTop -= mr.top   - r.top    + 40;
}

function gridRow(i)   { return Math.floor(i / COLS); }
function gridCol(i)   { return i % COLS; }
function gridRows()   { return Math.ceil(gridEls.length / COLS); }
function isFirstRow(i){ return gridRow(i) === 0; }
function isLastRow(i) { return gridRow(i) === gridRows() - 1; }

function enterNav(idx) {
  currentZone = ZONE_NAV;
  if (idx !== undefined) navIndex = idx;
  navIndex = Math.max(0, Math.min(navIndex, navEls.length - 1));
  applyFocusEl(navEls[navIndex]);
  var wrap = document.getElementById('nav-wrap');
  var btn  = navEls[navIndex];
  if (wrap && btn) {
    var bL=btn.offsetLeft, bW=btn.offsetWidth, wW=wrap.offsetWidth;
    if (bL+bW > wrap.scrollLeft+wW) wrap.scrollLeft=bL+bW-wW+16;
    if (bL    < wrap.scrollLeft)    wrap.scrollLeft=bL-16;
  }
}

function enterGrid(idx) {
  if (!gridEls.length) return;
  currentZone = ZONE_GRID;
  if (idx !== undefined) gridIndex = idx;
  gridIndex = Math.max(0, Math.min(gridIndex, gridEls.length - 1));
  applyFocusEl(gridEls[gridIndex]);
}

function enterFooter(idx) {
  if (!footerEls.length) return;
  currentZone = ZONE_FOOTER;
  if (idx !== undefined) footerIndex = idx;
  footerIndex = Math.max(0, Math.min(footerIndex, footerEls.length - 1));
  applyFocusEl(footerEls[footerIndex]);
}

function gridEntryFromTop() {
  return Math.min(savedGridCol, Math.min(COLS, gridEls.length) - 1);
}
function gridEntryFromBottom() {
  var lrs = (gridRows() - 1) * COLS;
  var lrc = gridEls.length - lrs;
  return lrs + Math.min(savedGridCol, lrc - 1);
}

function detectCols() {
  var grid = document.getElementById('matches-grid');
  if (!grid || !gridEls.length) return;
  var tpl = window.getComputedStyle(grid).getPropertyValue('grid-template-columns');
  if (tpl) { var p = tpl.trim().split(/\s+/); if (p.length) COLS = p.length; }
}

var KU=[38], KD=[40], KL=[37], KR=[39], KE=[13], KB=[8,10009];
function inK(c, a) { for (var i=0;i<a.length;i++) if(a[i]===c) return true; return false; }

document.addEventListener('keydown', function(e) {
  var kc = e.keyCode;

  if (drawerOpen) {
    if      (inK(kc,KB)) { e.preventDefault(); closeDrawer(); }
    else if (inK(kc,KD)) { e.preventDefault(); drawerEl.scrollTop += 140; }
    else if (inK(kc,KU)) { e.preventDefault(); drawerEl.scrollTop -= 140; }
    return;
  }

  if (inK(kc,KB)) { e.preventDefault(); mainEl.scrollTop=0; enterNav(0); return; }
  e.preventDefault();

  if (currentZone === ZONE_NAV) {
    if      (inK(kc,KL)) { if(navIndex>0){navIndex--;enterNav();} }
    else if (inK(kc,KR)) { if(navIndex<navEls.length-1){navIndex++;enterNav();} }
    else if (inK(kc,KD)) { if(gridEls.length>0) enterGrid(gridEntryFromTop()); }
    else if (inK(kc,KE)) { navEls[navIndex].click(); }
    return;
  }

  if (currentZone === ZONE_GRID) {
    var col = gridCol(gridIndex);
    if      (inK(kc,KL)) { if(col>0){gridIndex--;savedGridCol=gridCol(gridIndex);enterGrid();} }
    else if (inK(kc,KR)) { if(col<COLS-1&&gridIndex+1<gridEls.length){gridIndex++;savedGridCol=gridCol(gridIndex);enterGrid();} }
    else if (inK(kc,KU)) {
      if(isFirstRow(gridIndex)){savedGridCol=col;enterNav();}
      else{var t=gridIndex-COLS;if(t>=0){gridIndex=t;savedGridCol=gridCol(gridIndex);enterGrid();}}
    } else if (inK(kc,KD)) {
      if(isLastRow(gridIndex)){savedGridCol=col;if(footerEls.length>0)enterFooter(0);}
      else{var td=gridIndex+COLS;gridIndex=td<gridEls.length?td:gridEls.length-1;savedGridCol=gridCol(gridIndex);enterGrid();}
    } else if (inK(kc,KE)) {
      var card=gridEls[gridIndex];
      if(card){drawerSrcIdx=gridIndex;openDrawer(currentFixtures[gridIndex]);}
    }
    return;
  }

  if (currentZone === ZONE_FOOTER) {
    if      (inK(kc,KL)) { if(footerIndex>0){footerIndex--;enterFooter();} }
    else if (inK(kc,KR)) { if(footerIndex<footerEls.length-1){footerIndex++;enterFooter();} }
    else if (inK(kc,KU)) { if(gridEls.length>0)enterGrid(gridEntryFromBottom());else enterNav(); }
    else if (inK(kc,KE)) { footerEls[footerIndex].click(); }
    return;
  }
});

document.addEventListener('mouseover', function(e) {
  if (drawerOpen) return;
  var el = e.target && e.target.closest ? e.target.closest('.focusable') : null;
  if (!el) return;
  var ni=navEls.indexOf(el); if(ni>=0){currentZone=ZONE_NAV;navIndex=ni;applyFocusEl(el);return;}
  var gi=gridEls.indexOf(el); if(gi>=0){currentZone=ZONE_GRID;gridIndex=gi;savedGridCol=gridCol(gi);applyFocusEl(el);return;}
  var fi=footerEls.indexOf(el); if(fi>=0){currentZone=ZONE_FOOTER;footerIndex=fi;applyFocusEl(el);return;}
});

if (typeof tizen !== 'undefined') { try { tizen.tvinputdevice.registerKey('Back'); } catch(ex) {} }

/* ═══════════════════════════════════════════════════════════════
   BOOT — Splash screen → App
═══════════════════════════════════════════════════════════════ */
rebuildZones();
detectCols();

(function() {
  var splash  = document.getElementById('splash');
  var app     = document.getElementById('app');
  var SPLASH_DURATION = 3000; /* ms total antes do fade-out     */
  var FADE_DURATION   =  700; /* ms do fade-out (CSS transition) */

  /* Inicia carregamento de dados em paralelo com a splash */
  loadFilter('all', '', '');

  /* Após SPLASH_DURATION, fade-out da splash e mostra o app */
  setTimeout(function() {
    /* 1. Fade-out splash */
    splash.classList.add('hide');

    /* 2. Mostra o app e dispara animações de entrada */
    app.classList.add('app-visible');

    /* 3. Remove splash do DOM após a transição */
    setTimeout(function() {
      if (splash.parentNode) splash.parentNode.removeChild(splash);
    }, FADE_DURATION + 100);

    /* 4. Inicializa foco após a transição */
    setTimeout(function() {
      enterNav(0);
    }, FADE_DURATION);

  }, SPLASH_DURATION);

  /* Stagger delay nos cards quando forem renderizados */
  /* O renderMatches chama rebuildZones — interceptamos com MutationObserver */
  var grid = document.getElementById('matches-grid');
  var observer = new MutationObserver(function() {
    var cards = grid.querySelectorAll('.match-card');
    for (var i = 0; i < cards.length; i++) {
      cards[i].style.animationDelay = (i * 0.05) + 's';
    }
  });
  if (grid) {
    observer.observe(grid, { childList: true });
  }
})();

</script>
